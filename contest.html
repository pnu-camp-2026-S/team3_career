<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커리어핏 - 공모전 추천</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #fff; color: #333; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 24px; }
        .sidebar-header h2 { font-size: 22px; font-weight: 800; color: #2563eb; margin-bottom: 24px; }
        .btn-upload { width: 100%; padding: 12px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px; color: #475569; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 24px; }
        .nav-title { font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 12px; margin-top: 10px; text-transform: uppercase; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 10px 12px; border-radius: 8px; font-size: 14px; color: #475569; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #e2e8f0; cursor: pointer; }
        
        .content-area { flex: 1; display: flex; flex-direction: column; }
        .topbar { height: 64px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 40px; gap: 32px; }
        .tab-btn { text-decoration: none; font-size: 15px; font-weight: 600; color: #64748b; padding: 22px 0; position: relative; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: #2563eb; border-radius: 3px 3px 0 0; }
        
        .chat-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        .message { display: flex; gap: 16px; max-width: 860px; margin: 0 auto; width: 100%; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #eff6ff; color: #2563eb; }
        .msg-content { flex: 1; padding-top: 8px; line-height: 1.6; color: #334155; font-size: 15px; }
        .msg-title { font-weight: 700; font-size: 18px; color: #1e293b; margin-bottom: 12px; }
        .result-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-top: 12px; }
        
        .input-wrapper { padding: 20px 40px 40px; }
        .input-box { max-width: 860px; margin: 0 auto; display: flex; align-items: flex-end; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; }
        .input-box textarea { flex: 1; border: none; resize: none; outline: none; font-size: 15px; padding: 6px 0; }
        .btn-send { background: #2563eb; color: #fff; border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; margin-left: 12px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CareerFit</h2>
        </div>
        <button class="btn-upload"><i class="fa-solid fa-cloud-arrow-up"></i> 학적/포트폴리오 업로드</button>
        <div class="nav-title">내 소스 파일</div>
        <ul class="nav-list">
            <li class="nav-item"><i class="fa-regular fa-file-pdf"></i> 성적증명서.pdf</li>
        </ul>
    </aside>

    <main class="content-area">
        <header class="topbar">
            <a href="main.html" class="tab-btn">메인</a>
            <a href="portfolio.html" class="tab-btn">포트폴리오 자동 작성</a>
            <a href="contest.html" class="tab-btn active">교내외 공모전 추천</a>
        </header>

        <div class="chat-container">
            <div class="message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="msg-content">
                    <div class="msg-title">학적 & 역량 기반 맞춤 공모전 🏆</div>
                    <p>사용자님의 학적 정보를 바탕으로 지원하기 좋은 공모전과 교내 프로젝트를 스크랩했습니다.</p>
                    <div class="result-card">
                        <h4 style="color:#ea580c;"><i class="fa-solid fa-school"></i> 교내 LINC 3.0 사업단 (매칭률 95%)</h4>
                        <p style="font-size:14px; margin-top:4px;"><strong>[학사공지]</strong> 하반기 지역사회 문제해결형 실전 프로젝트 모집</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea placeholder="특정 분야의 공모전을 찾아드릴까요? (예: 기획 분야 공모전 찾아줘)" rows="1"></textarea>
                <button class="btn-send"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </main>
</body>
</html>
