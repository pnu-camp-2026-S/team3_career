function wireSidebarFolders() {
  document.querySelectorAll("[data-folder-toggle]").forEach((button) => {
    button.addEventListener("click", () => {
      const section = button.closest(".folder-section");
      section?.classList.toggle("open");
      button.setAttribute("aria-expanded", section?.classList.contains("open") ? "true" : "false");
    });
  });
}

function field(label, value, type = "text") {
  return `
    <div class="form-field">
      <label>${label}</label>
      <input type="${type}" value="${value}" />
    </div>
  `;
}

function selectField(label, value, options = [value]) {
  return `
    <div class="form-field">
      <label>${label}</label>
      <select>
        ${options.map((option) => `<option ${option === value ? "selected" : ""}>${option}</option>`).join("")}
      </select>
    </div>
  `;
}

function getDetailJobOptions() {
  const selectedJobs = [...profileState.chips.jobs];
  const options = selectedJobs.flatMap((job) => detailJobsByJob[job] || []);
  return [...new Set(options.length ? options : Object.values(detailJobsByJob).flat())];
}

function formatDateDisplay(value) {
  const [year, month, day] = value.split("-");
  return `${year}.${month}.${day}.`;
}

function getDateParts(value) {
  const [year, month, day] = value.split("-").map(Number);
  return { year, month, day };
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function renderDatePicker() {
  if (!profileState.datePickerOpen) return "";

  const { year, month, day } = getDateParts(profileState.birthDate);
  const years = Array.from({ length: 41 }, (_, index) => 1970 + index);
  const months = Array.from({ length: 12 }, (_, index) => index + 1);
  const days = Array.from({ length: getDaysInMonth(year, month) }, (_, index) => index + 1);

  return `
    <div class="date-picker-panel">
      <div class="date-picker-selects">
        <label>
          <span>�?/span>
          <select data-date-part="year">
            ${years.map((item) => `<option value="${item}" ${item === year ? "selected" : ""}>${item}</option>`).join("")}
          </select>
        </label>
        <label>
          <span></span>
          <select data-date-part="month">
            ${months.map((item) => `<option value="${item}" ${item === month ? "selected" : ""}>${item}</option>`).join("")}
          </select>
        </label>
      </div>
      <div class="date-days">
        ${days
          .map(
            (item) => `
              <button class="${item === day ? "selected" : ""}" type="button" data-date-day="${item}">
                ${item}
              </button>
            `,
          )
          .join("")}
      </div>
    </div>
  `;
}

  return `

        <button class="date-trigger" type="button">

          <span class="date-trigger-icon" data-toggle-date-picker>${icon("calendar")}</span>

    </div>
  `;
}

        <div class="form-field">
          <label>б�?/label>
          <input data-edu-field="period" data-edu-index="${index}" type="text" value="${education.period}" />
        </div>
        ${renderMajorPicker(index, "major", "", education.major)}
        ${renderMajorPicker(index, "minor", "/", education.minor)}
        <div class="form-field">
          <label></label>
          <input data-edu-field="gpa" data-edu-index="${index}" type="text" value="${education.gpa}" />
        </div>
      </div>
    </div>
  `;
}

function collectEducationValues() {
  document.querySelectorAll("[data-edu-field]").forEach((input) => {
    const index = Number(input.dataset.eduIndex);
    const fieldName = input.dataset.eduField;
    if (profileState.educations[index]) {
      profileState.educations[index][fieldName] = input.value;
    }
  });
}

function renderSearchOptions(type, query = "") {
  const config = searchConfigs[type];
  const normalizedQuery = query.trim().toLowerCase();
  const options = config.options().filter((option) => option.toLowerCase().includes(normalizedQuery));

  if (!options.length) {
    return `<div class="empty-options">˻  .</div>`;
  }

  return options
    .map(
      (option) => `
        <button class="search-option ${profileState.preferences[type] === option ? "selected" : ""}" type="button" data-select-search="${type}" data-search-value="${option}">
          ${option}
        </button>
      `,
    )
    .join("");
}

function wireSearchOptionButtons(type) {
  document.querySelectorAll("[data-select-search]").forEach((button) => {
    button.addEventListener("click", () => {
      profileState.preferences[type] = button.dataset.searchValue || "";
      closeSearchModal();
      renderMypage();
    });
  });
}

function wireSearchModal(type) {
  const input = document.querySelector("[data-search-input]");
  const optionList = document.querySelector("[data-search-options]");

  input?.addEventListener("input", () => {
    if (optionList) optionList.innerHTML = renderSearchOptions(type, input.value);
    wireSearchOptionButtons(type);
  });

  wireSearchOptionButtons(type);

  document.querySelector("[data-close-modal]")?.addEventListener("click", closeSearchModal);
  document.querySelector("[data-modal-backdrop]")?.addEventListener("click", closeSearchModal);
}

function renderSearchModal(type) {
  const config = searchConfigs[type];
  const modalRoot = document.querySelector("#modalRoot");
  if (!config || !modalRoot) return;
  const helperText =
    type === "detailJob" && profileState.chips.jobs.size
      ? `  : ${[...profileState.chips.jobs].join(", ")}`
      : "˻ϰų Ʒ Ͽ ϼ.";

  modalRoot.innerHTML = `
    <div class="modal-backdrop" data-modal-backdrop></div>
    <section class="search-modal" role="dialog" aria-modal="true" aria-label="${config.label} ">
      <div class="search-modal-head">
        <div>
          <h3>${config.label} </h3>
          <p>${helperText}</p>
        </div>
        <button class="icon-button modal-close" type="button" data-close-modal aria-label="ݱ"></button>
      </div>
      <div class="modal-search-box">
        ${icon("search")}
        <input data-search-input type="search" placeholder="${config.placeholder}" autofocus />
      </div>
      <div class="search-options" data-search-options>
        ${renderSearchOptions(type)}
      </div>
    </section>
  `;
  wireSearchModal(type);
}

function closeSearchModal() {
  const modalRoot = document.querySelector("#modalRoot");
  if (modalRoot) modalRoot.innerHTML = "";
}

function wireMypage() {
  const photoInput = document.querySelector("#photoInput");
  const photoButton = document.querySelector("[data-photo-button]");
  const photoPreview = document.querySelector("[data-photo-preview]");

  photoButton?.addEventListener("click", () => photoInput?.click());
  photoInput?.addEventListener("change", () => {
    const file = photoInput.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.addEventListener("load", () => {
      profileState.photo = String(reader.result || "");
      localStorage.setItem("myfitfolioPhoto", profileState.photo);
      if (photoPreview) {
        photoPreview.innerHTML = `<img src="${profileState.photo}" alt=" " />`;
        photoPreview.classList.add("has-photo");
      }
    });
    reader.readAsDataURL(file);
  });

  document.querySelector("[data-add-education]")?.addEventListener("click", () => {
    collectEducationValues();
    profileState.educations.push({
      schoolType: "б 4",
      school: "",
      period: "",
      major: "",
      minor: "",
      gpa: "",
    });
    renderMypage();
  });

  document.querySelector("#school")?.addEventListener("click", (event) => {
    const deleteButton = event.target.closest("[data-delete-education]");
    if (!deleteButton || profileState.educations.length <= 1) return;
    collectEducationValues();
    profileState.educations.splice(Number(deleteButton.dataset.deleteEducation), 1);
    renderMypage();
  });

  document.querySelectorAll("[data-edu-field]").forEach((input) => {
    input.addEventListener("input", () => {
      const index = Number(input.dataset.eduIndex);
      const fieldName = input.dataset.eduField;
      profileState.educations[index][fieldName] = input.value;
    });
    input.addEventListener("change", () => {
      const index = Number(input.dataset.eduIndex);
      const fieldName = input.dataset.eduField;
      profileState.educations[index][fieldName] = input.value;
    });
  });

  document.querySelectorAll("[data-major-trigger]").forEach((button) => {
    button.addEventListener("click", () => {
      const menu = document.querySelector(`[data-major-menu="${button.dataset.majorTrigger}"]`);
      document.querySelectorAll(".major-menu.open").forEach((openMenu) => {
        if (openMenu !== menu) openMenu.classList.remove("open");
      });
      menu?.classList.toggle("open");
    });
  });

  document.querySelectorAll("[data-major-option]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.majorOption);
      const fieldName = button.dataset.majorField || "major";
      const value = button.dataset.majorValue || "";
      profileState.educations[index][fieldName] = value;
      const trigger = document.querySelector(`[data-major-trigger="${index}-${fieldName}"] span`);
      const menu = document.querySelector(`[data-major-menu="${index}-${fieldName}"]`);
      if (trigger) trigger.textContent = value;
      menu?.classList.remove("open");
    });
  });

  document.querySelectorAll("[data-anchor-target]").forEach((button) => {
    button.addEventListener("click", () => {
      const target = document.querySelector(`#${button.dataset.anchorTarget}`);
      target?.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll("[data-anchor-target]").forEach((item) => item.classList.remove("active"));
      button.classList.add("active");
    });
  });

  document.querySelectorAll("[data-open-search]").forEach((button) => {
    button.addEventListener("click", () => renderSearchModal(button.dataset.openSearch));
  });

  document.querySelector("[data-salary-select]")?.addEventListener("change", (event) => {
    profileState.preferences.salary = event.target.value;
  });

  document.querySelector("[data-save-profile]")?.addEventListener("click", () => {
    sessionStorage.setItem("myfitfolioProfileSaved", "true");
    setRoute("main");
  });

  document.querySelector("[data-toggle-date-picker]")?.addEventListener("click", () => {
    profileState.datePickerOpen = !profileState.datePickerOpen;
    renderMypage();
  });

  document.querySelectorAll("[data-date-part]").forEach((select) => {
    select.addEventListener("change", () => {
      const { year, month, day } = getDateParts(profileState.birthDate);
      const nextYear = select.dataset.datePart === "year" ? Number(select.value) : year;
      const nextMonth = select.dataset.datePart === "month" ? Number(select.value) : month;
      const nextDay = Math.min(day, getDaysInMonth(nextYear, nextMonth));
      profileState.birthDate = `${nextYear}-${String(nextMonth).padStart(2, "0")}-${String(nextDay).padStart(2, "0")}`;
      profileState.datePickerOpen = true;
      renderMypage();
    });
  });

  document.querySelectorAll("[data-date-day]").forEach((button) => {
    button.addEventListener("click", () => {
      const { year, month } = getDateParts(profileState.birthDate);
      const nextDay = Number(button.dataset.dateDay);
      profileState.birthDate = `${year}-${String(month).padStart(2, "0")}-${String(nextDay).padStart(2, "0")}`;
      profileState.datePickerOpen = false;
      renderMypage();
    });
  });

  document.querySelectorAll("[data-chip-group]").forEach((button) => {
    button.addEventListener("click", () => {
      const group = button.dataset.chipGroup;
      const value = button.dataset.chipValue;
      const selectedSet = profileState.chips[group];
      if (!selectedSet || !value) return;

      if (selectedSet.has(value)) {
        selectedSet.delete(value);
        button.classList.remove("selected");
      } else {
        selectedSet.add(value);
        button.classList.add("selected");
      }

      if (group === "jobs" && profileState.preferences.detailJob && !getDetailJobOptions().includes(profileState.preferences.detailJob)) {
        profileState.preferences.detailJob = "";
      }

      if (group === "jobs") {
        renderMypage();
      }
    });
  });
}

function renderBlank(route) {
  app.innerHTML = `
    <div class="app-shell">
      ${renderNav(route)}
      <main class="blank-page" aria-label="${routes[route]}  ȭ"></main>
    </div>
  `;
  wireRoutes();
}

function render() {
  const route = window.location.hash.replace("#", "");
  const loggedIn = sessionStorage.getItem("myfitfolioLoggedIn") === "true";

  if (!loggedIn && route !== "login") {
    renderAuth("signup");
    return;
  }

  if (route === "login") {
    renderAuth("login");
    return;
  }

  if (route === "mypage") {
    renderMypage();
    return;
  }

  if (route === "portfolioCreate" || route === "portfolioManage" || route === "recommend") {
    renderBlank(route);
    return;
  }

  renderMain();
}

window.addEventListener("hashchange", render);
render();
