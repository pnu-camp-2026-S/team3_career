<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myfitfolio</title>
    <style>
:root {
  --brand: #155cff;
  --brand-dark: #0d3fd5;
  --ink: #101c33;
  --muted: #6f7d91;
  --line: #dbe3ef;
  --soft-line: #edf1f7;
  --surface: #ffffff;
  --surface-soft: #f7f9fd;
  --blue-soft: #eef4ff;
  --green: #38b764;
  --green-soft: #eaf8ef;
  --orange: #f27b36;
  --orange-soft: #fff0e6;
  --red: #f05265;
  --red-soft: #fff0f3;
  --shadow: 0 14px 40px rgba(18, 38, 63, 0.08);
  font-family:
    Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont,
    "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  color: var(--ink);
  background: #fff;
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.auth-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 20px;
  background: #f6f8fc;
}

.auth-shell {
  width: min(1160px, 100%);
  min-height: min(760px, calc(100vh - 40px));
  display: grid;
  grid-template-columns: 1fr 1.04fr;
  overflow: hidden;
  border-radius: 20px;
  background: var(--surface);
  box-shadow: 0 22px 70px rgba(15, 23, 42, 0.15);
}

.auth-brand {
  position: relative;
  display: grid;
  place-items: center;
  padding: 56px;
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 100%, rgba(21, 92, 255, 0.16), transparent 38%),
    linear-gradient(145deg, #f8fbff 0%, #edf4ff 100%);
}

.auth-brand-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.brand-logo {
  margin: 0;
  font-size: clamp(44px, 6vw, 76px);
  line-height: 1;
  letter-spacing: 0;
  color: #081833;
  font-weight: 900;
}

.brand-logo span,
.brand-word span {
  color: var(--brand);
}

.auth-tagline {
  margin: 36px 0 0;
  font-size: 25px;
  line-height: 1.72;
  font-weight: 500;
}

.auth-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 58px 60px;
  background: #fff;
}

.auth-tabs {
  width: min(420px, 100%);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  margin-bottom: 72px;
}

.auth-tab {
  height: 48px;
  border: 0;
  border-bottom: 3px solid transparent;
  color: #7b8493;
  background: transparent;
  font-size: 18px;
  font-weight: 700;
}

.auth-tab.active {
  color: var(--brand);
  border-color: var(--brand);
}

.auth-content {
  width: min(456px, 100%);
  text-align: center;
}

.auth-content h1 {
  margin: 0;
  font-size: 36px;
  letter-spacing: 0;
}

.auth-content p {
  margin: 24px 0 46px;
  color: var(--muted);
  font-size: 19px;
}

.social-stack {
  display: grid;
  gap: 18px;
}

.social-button {
  width: 100%;
  height: 68px;
  display: grid;
  grid-template-columns: 92px 1fr 52px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: #182033;
  font-size: 22px;
  font-weight: 700;
  transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
}

.social-button:hover {
  border-color: #a9baf4;
  box-shadow: 0 12px 26px rgba(21, 92, 255, 0.09);
  transform: translateY(-1px);
}

.social-icon {
  justify-self: end;
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  font-weight: 900;
}

.google-icon {
  color: #4285f4;
  font-size: 30px;
}

.kakao-icon {
  background: #2a1715;
}

.kakao-icon::after {
  content: "";
  width: 20px;
  height: 15px;
  border-radius: 50%;
  background: #2a1715;
  box-shadow: 3px 3px 0 -1px #2a1715;
}

.naver-icon {
  color: #03c75a;
  font-size: 32px;
}

.auth-note {
  margin-top: 34px;
  color: var(--muted);
  font-size: 16px;
}

.app-shell {
  min-height: 100vh;
  background: #fff;
}

.top-nav {
  position: sticky;
  top: 0;
  z-index: 20;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 34px;
  padding: 0 38px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(14px);
}

.brand-word {
  border: 0;
  background: transparent;
  color: var(--brand);
  font-size: 21px;
  font-weight: 900;
  letter-spacing: 0;
  white-space: nowrap;
}

.nav-tabs {
  display: flex;
  align-self: stretch;
  gap: 30px;
  margin-left: 24px;
}

.nav-tab {
  position: relative;
  border: 0;
  background: transparent;
  color: #4e5868;
  font-size: 14px;
  font-weight: 800;
  white-space: nowrap;
}

.nav-tab.active {
  color: var(--brand);
}

.nav-tab.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 4px;
  border-radius: 999px 999px 0 0;
  background: var(--brand);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-left: auto;
}

.icon-button {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: #6c7688;
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  border: 0;
  background: transparent;
}

.avatar,
.avatar-lg {
  position: relative;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 35%, #d9dde5 0 17%, transparent 18%),
    radial-gradient(circle at 50% 82%, #c8cdd7 0 35%, transparent 36%),
    #eef1f6;
}

.avatar {
  width: 36px;
  height: 36px;
}

.avatar.online::after {
  content: "";
  position: absolute;
  right: 1px;
  bottom: 4px;
  width: 9px;
  height: 9px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: #40c968;
}

.avatar-lg {
  width: 88px;
  height: 88px;
}

.layout-main {
  display: grid;
  grid-template-columns: 280px 1fr;
}

.sidebar {
  min-height: calc(100vh - 72px);
  padding: 22px 22px;
  border-right: 1px solid var(--line);
  background: #f8fbff;
}

.sidebar-email {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #596579;
  font-size: 16px;
  font-weight: 700;
}

.primary-button,
.outline-button,
.ghost-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 48px;
  border-radius: 8px;
  font-weight: 850;
}

.primary-button {
  border: 1px solid var(--brand);
  background: var(--brand);
  color: #fff;
  box-shadow: 0 10px 24px rgba(21, 92, 255, 0.2);
}

.outline-button {
  border: 1px solid #9eb8ff;
  background: #fff;
  color: var(--brand);
}

.ghost-button {
  border: 1px solid var(--line);
  background: #fff;
  color: #425066;
}

.upload-button {
  width: 100%;
  height: 48px;
  margin: 24px 0;
  font-size: 15px;
}

.folder-section {
  margin-top: 22px;
}

.folder-title {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  border: 0;
  padding: 0;
  background: transparent;
  color: #526077;
  font-size: 14px;
  font-weight: 850;
  text-align: left;
}

.folder-chevron {
  display: grid;
  place-items: center;
  color: #7d8796;
  transition: transform 160ms ease;
}

.folder-chevron .svg-icon {
  width: 18px;
  height: 18px;
}

.folder-list {
  display: none;
  gap: 14px;
}

.folder-section.open .folder-list {
  display: grid;
}

.folder-section.open .folder-chevron {
  transform: rotate(180deg);
}

.folder-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: center;
  gap: 10px;
  color: #536176;
  font-size: 14px;
  font-weight: 700;
}

.folder-count {
  color: #7d8796;
}

.ai-helper {
  margin-top: 28px;
  padding: 18px 20px;
  border: 1px solid #d4e1ff;
  border-radius: 12px;
  background: #f4f8ff;
}

.ai-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 10px;
  color: var(--brand);
  font-size: 17px;
  font-weight: 900;
}

.ai-helper p {
  margin: 0 0 16px;
  color: #6c7688;
  font-size: 14px;
  line-height: 1.5;
}

.dashboard {
  padding: 26px 38px 34px;
}

.page-title {
  margin: 0;
  font-size: 30px;
  line-height: 1.22;
  letter-spacing: 0;
}

.page-subtitle {
  margin: 14px 0 24px;
  color: #697586;
  font-size: 16px;
  font-weight: 650;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(150px, 1fr));
  gap: 18px;
}

.stat-card {
  min-height: 118px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
}

.metric-icon {
  width: 56px;
  height: 56px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  border-radius: 50%;
  color: var(--brand);
  background: var(--blue-soft);
}

.metric-icon.green {
  color: var(--green);
  background: var(--green-soft);
}

.metric-icon.orange {
  color: var(--orange);
  background: var(--orange-soft);
}

.metric-icon.red {
  color: var(--red);
  background: var(--red-soft);
}

.stat-label {
  margin-bottom: 6px;
  color: #526077;
  font-size: 14px;
  font-weight: 850;
}

.stat-value {
  display: flex;
  align-items: baseline;
  gap: 7px;
  font-weight: 900;
}

.stat-number {
  font-size: 36px;
  line-height: 1;
}

.stat-unit {
  color: #3d4655;
  font-size: 16px;
}

.panel {
  margin-top: 20px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
}

.panel-title {
  margin: 0 0 14px;
  font-size: 20px;
  font-weight: 900;
}

.analysis-grid {
  display: grid;
  grid-template-columns: 1.05fr 1.05fr 1.2fr;
  gap: 14px;
}

.analysis-card {
  min-height: 190px;
  padding: 18px;
  border: 1px solid var(--soft-line);
  border-radius: 12px;
  background: #fff;
}

.small-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 16px;
  color: #2f3a4c;
  font-size: 14px;
  font-weight: 900;
}

.donut-row {
  display: grid;
  grid-template-columns: 112px 1fr;
  align-items: center;
  gap: 18px;
}

.donut {
  width: 108px;
  height: 108px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: conic-gradient(#e8edf5 0 100%);
}

.donut::after {
  content: "0%";
  width: 64px;
  height: 64px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: #fff;
  font-size: 22px;
  font-weight: 900;
}

.skeleton-list {
  display: grid;
  gap: 13px;
}

.skeleton-line {
  height: 10px;
  border-radius: 999px;
  background: #e8edf5;
}

.skeleton-line.short {
  width: 64%;
}

.legend-line {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 22px;
  color: #526077;
  font-weight: 800;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--brand);
}

.dot.green {
  background: var(--green);
}

.empty-analysis {
  min-height: 106px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  text-align: left;
}

.empty-analysis h3 {
  margin: 0 0 8px;
  font-size: 18px;
}

.empty-analysis p {
  margin: 0;
  color: #697586;
  font-size: 14px;
  font-weight: 650;
}

.next-card {
  min-height: 124px;
  display: grid;
  grid-template-columns: 76px minmax(240px, 1fr) auto;
  align-items: center;
  gap: 22px;
  margin-top: 20px;
  padding: 22px 30px;
  border: 1px solid #d4e1ff;
  border-radius: 12px;
  background: linear-gradient(90deg, #f9fbff, #fff);
}

.next-card h3 {
  margin: 0 0 8px;
  font-size: 20px;
}

.next-card p {
  margin: 0;
  color: #697586;
  font-size: 14px;
  line-height: 1.48;
  font-weight: 650;
}

.next-actions {
  display: flex;
  gap: 14px;
}

.next-actions button {
  min-width: 190px;
  height: 48px;
  font-size: 16px;
}

.mypage {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 140px;
  gap: 24px;
  padding: 28px 48px 42px;
}

.mypage-content {
  min-width: 0;
}

.mypage .page-title {
  font-size: 28px;
}

.mypage .page-subtitle {
  margin: 10px 0 18px;
  font-size: 12px;
}

.profile-section {
  padding: 24px 28px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  scroll-margin-top: 92px;
}

.section-heading {
  margin: 0 0 18px;
  font-size: 18px;
  font-weight: 900;
}

.field-grid {
  display: grid;
  grid-template-columns: 180px repeat(3, minmax(160px, 1fr));
  gap: 28px 34px;
  align-items: end;
}

.profile-photo {
  display: grid;
  justify-items: center;
  gap: 12px;
}

.profile-photo .ghost-button {
  min-height: 34px;
  padding: 0 12px;
  font-size: 12px;
  gap: 6px;
}

.profile-photo .ghost-button .svg-icon {
  width: 15px;
  height: 15px;
}

.avatar-lg {
  display: grid;
  place-items: center;
  overflow: hidden;
}

.avatar-lg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-lg.has-photo {
  background: #eef4ff;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

.form-field {
  position: relative;
  display: grid;
  gap: 9px;
}

.form-field label {
  font-size: 13px;
  font-weight: 850;
}

.form-field input,
.form-field select {
  width: 100%;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 14px;
  color: #273244;
  background: #fff;
}

.date-control {
  position: relative;
}

.date-trigger {
  width: 100%;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 12px 0 14px;
  background: #fff;
  color: #273244;
  text-align: left;
  font-weight: 750;
}

.date-trigger > span:first-child {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.date-trigger-icon {
  display: grid;
  place-items: center;
  flex: 0 0 24px;
  height: 24px;
  border-radius: 6px;
}

.date-trigger-icon:hover {
  background: #eef4ff;
}

.date-trigger-icon .svg-icon {
  width: 18px;
  height: 18px;
  color: #7f8aa0;
}

.date-picker-panel {
  position: absolute;
  left: 0;
  top: calc(100% + 6px);
  z-index: 30;
  width: 280px;
  display: grid;
  gap: 12px;
  padding: 12px;
  border: 1px solid #b9c8f5;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
}

.date-picker-selects {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.date-picker-selects label {
  display: grid;
  gap: 6px;
  color: #5c687a;
  font-size: 12px;
  font-weight: 850;
}

.date-picker-selects select {
  height: 36px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 8px;
  background: #fff;
}

.date-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.date-days button {
  height: 30px;
  border: 0;
  border-radius: 6px;
  background: #f5f7fb;
  color: #344055;
  font-size: 12px;
  font-weight: 850;
}

.date-days button:hover,
.date-days button.selected {
  background: var(--brand);
  color: #fff;
}

.section-stack {
  display: grid;
  gap: 14px;
}

.inline-fields {
  display: grid;
  grid-template-columns: repeat(3, minmax(160px, 1fr));
  gap: 36px;
}

.education-grid {
  display: grid;
  grid-template-columns: 140px 1fr 1.15fr 1fr 1fr 100px;
  gap: 16px;
}

.education-list {
  display: grid;
  gap: 16px;
}

.education-item {
  position: relative;
  padding: 14px;
  border: 1px solid var(--soft-line);
  border-radius: 8px;
  background: #fbfcff;
}

.education-item.has-delete {
  padding-right: 48px;
}

.delete-education {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 50%;
  padding: 0;
  background: transparent;
  color: #8b96a8;
}

.delete-education .svg-icon {
  width: 15px;
  height: 15px;
}

.delete-education:hover {
  background: #eef1f6;
  color: #667085;
}

.major-field {
  z-index: 2;
}

.major-trigger {
  width: 100%;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 12px 0 14px;
  background: #fff;
  color: #273244;
  text-align: left;
}

.major-trigger span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.major-trigger .svg-icon {
  width: 18px;
  height: 18px;
}

.major-menu {
  position: absolute;
  left: 0;
  right: 0;
  top: calc(100% + 6px);
  display: none;
  max-height: 220px;
  overflow-y: auto;
  padding: 6px;
  border: 1px solid #b9c8f5;
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 16px 32px rgba(15, 23, 42, 0.14);
}

.major-menu.open {
  display: grid;
}

.major-menu button {
  min-height: 34px;
  border: 0;
  border-radius: 6px;
  padding: 0 10px;
  background: #fff;
  color: #344055;
  text-align: left;
  font-weight: 700;
}

.major-menu button:hover {
  background: #f1f5ff;
  color: var(--brand);
}

.picker-trigger {
  width: 100%;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 12px 0 14px;
  background: #fff;
  color: #273244;
  text-align: left;
  font-weight: 750;
}

.picker-trigger .placeholder {
  color: #9aa5b5;
  font-weight: 650;
}

.picker-trigger .svg-icon {
  width: 18px;
  height: 18px;
  color: #7f8aa0;
}

.job-grid {
  display: grid;
  gap: 16px;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 12px;
}

.chip {
  min-width: 92px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: #425066;
  font-size: 12px;
  font-weight: 800;
}

.chip .svg-icon {
  width: 16px;
  height: 16px;
  margin-right: 6px;
}

.chip.selected {
  border-color: #6d95ff;
  color: var(--brand);
  background: #eef4ff;
  box-shadow: inset 0 0 0 1px rgba(21, 92, 255, 0.16);
}

.search-row {
  display: grid;
  grid-template-columns: 1.1fr 1.1fr 0.6fr 0.8fr;
  gap: 18px;
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 14px;
  margin-top: 18px;
}

.form-actions button {
  min-width: 92px;
  height: 40px;
}

.anchor-menu {
  position: sticky;
  top: 108px;
  align-self: start;
  padding: 22px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}

.anchor-menu button {
  position: relative;
  width: 100%;
  height: 36px;
  border: 0;
  background: transparent;
  color: #697586;
  font-size: 12px;
  font-weight: 800;
  text-align: left;
}

.anchor-menu button.active {
  color: var(--brand);
}

.anchor-menu button.active::before {
  content: "";
  position: absolute;
  left: -14px;
  top: 8px;
  bottom: 8px;
  width: 3px;
  border-radius: 99px;
  background: var(--brand);
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(15, 23, 42, 0.36);
}

.search-modal {
  position: fixed;
  left: 50%;
  top: 50%;
  z-index: 60;
  width: min(520px, calc(100vw - 32px));
  max-height: min(620px, calc(100vh - 56px));
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr);
  gap: 18px;
  padding: 24px;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
  transform: translate(-50%, -50%);
}

.search-modal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
}

.search-modal-head h3 {
  margin: 0 0 8px;
  font-size: 20px;
}

.search-modal-head p {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
  font-weight: 650;
}

.modal-close {
  flex: 0 0 auto;
  font-size: 28px;
  line-height: 1;
}

.modal-search-box {
  height: 46px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #b9c8f5;
  border-radius: 8px;
  padding: 0 14px;
  background: #fbfcff;
}

.modal-search-box .svg-icon {
  width: 19px;
  height: 19px;
  color: var(--brand);
}

.modal-search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
}

.search-options {
  display: grid;
  gap: 8px;
  overflow-y: auto;
  padding-right: 4px;
}

.search-option {
  min-height: 40px;
  border: 1px solid var(--soft-line);
  border-radius: 8px;
  padding: 0 14px;
  background: #fff;
  color: #344055;
  text-align: left;
  font-weight: 800;
}

.search-option:hover,
.search-option.selected {
  border-color: #8aabff;
  background: #eef4ff;
  color: var(--brand);
}

.empty-options {
  padding: 28px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  text-align: center;
  font-weight: 750;
}

.blank-page {
  min-height: calc(100vh - 72px);
  background: #fff;
}

.svg-icon {
  width: 28px;
  height: 28px;
  stroke: currentColor;
  stroke-width: 2.2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.svg-icon.fill {
  fill: currentColor;
  stroke: none;
}

@media (max-width: 1280px) {
  .layout-main {
    grid-template-columns: 310px 1fr;
  }

  .dashboard {
    padding: 34px;
  }

  .stats-grid,
  .analysis-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .next-card {
    grid-template-columns: 80px 1fr;
  }

  .next-actions {
    grid-column: 1 / -1;
  }

  .mypage {
    padding: 28px;
  }
}

@media (max-width: 900px) {
  .auth-shell,
  .layout-main,
  .mypage {
    grid-template-columns: 1fr;
  }

  .auth-brand {
    min-height: 330px;
  }

  .auth-shell {
    min-height: auto;
  }

  .auth-panel {
    padding: 44px 26px;
  }

  .auth-tabs {
    margin-bottom: 48px;
  }

  .top-nav {
    height: auto;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 20px 0;
  }

  .nav-tabs {
    order: 3;
    width: 100%;
    gap: 22px;
    margin-left: 0;
    overflow-x: auto;
  }

  .nav-tab {
    min-height: 48px;
  }

  .nav-actions {
    margin-left: auto;
  }

  .sidebar {
    min-height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .dashboard {
    padding: 28px 18px;
  }

  .stats-grid,
  .analysis-grid,
  .field-grid,
  .inline-fields,
  .education-grid,
  .search-row {
    grid-template-columns: 1fr;
  }

  .mypage {
    padding: 24px 16px;
  }

  .anchor-menu {
    display: none;
  }

  .next-card {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .next-actions {
    flex-direction: column;
  }

  .next-actions button {
    width: 100%;
    min-width: 0;
  }
}

function field(label, value, type = "text") {
  return `
    <div class="form-field">
      <label>${label}</label>
      <input type="${type}" value="${value}" />
    </div>
  `;
}

function selectField(label, value, options = [value]) {
  return `
    <div class="form-field">
      <label>${label}</label>
      <select>
        ${options.map((option) => `<option ${option === value ? "selected" : ""}>${option}</option>`).join("")}
      </select>
    </div>
  `;
}

function getDetailJobOptions() {
  const selectedJobs = [...profileState.chips.jobs];
  const options = selectedJobs.flatMap((job) => detailJobsByJob[job] || []);
  return [...new Set(options.length ? options : Object.values(detailJobsByJob).flat())];
}

function formatDateDisplay(value) {
  const [year, month, day] = value.split("-");
  return `${year}.${month}.${day}.`;
}

function getDateParts(value) {
  const [year, month, day] = value.split("-").map(Number);
  return { year, month, day };
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function renderDatePicker() {
  if (!profileState.datePickerOpen) return "";

  const { year, month, day } = getDateParts(profileState.birthDate);
  const years = Array.from({ length: 41 }, (_, index) => 1970 + index);
  const months = Array.from({ length: 12 }, (_, index) => index + 1);
  const days = Array.from({ length: getDaysInMonth(year, month) }, (_, index) => index + 1);

  return `
    <div class="date-picker-panel">
      <div class="date-picker-selects">
        <label>
          <span>년도</span>
          <select data-date-part="year">
            ${years.map((item) => `<option value="${item}" ${item === year ? "selected" : ""}>${item}년</option>`).join("")}
          </select>
        </label>
        <label>
          <span>월</span>
          <select data-date-part="month">
            ${months.map((item) => `<option value="${item}" ${item === month ? "selected" : ""}>${item}월</option>`).join("")}
          </select>
        </label>
      </div>
      <div class="date-days">
        ${days
          .map(
            (item) => `
              <button class="${item === day ? "selected" : ""}" type="button" data-date-day="${item}">
                ${item}
              </button>
            `,
          )
          .join("")}
      </div>
    </div>
  `;
}

function dateField(label, value) {
  return `
    <div class="form-field">
      <label>${label}</label>
      <div class="date-control">
        <button class="date-trigger" type="button">
          <span>${formatDateDisplay(value)}</span>
          <span class="date-trigger-icon" data-toggle-date-picker>${icon("calendar")}</span>
        </button>
        ${renderDatePicker()}
      </div>
    </div>
  `;
}

function collectEducationValues() {
  document.querySelectorAll("[data-edu-field]").forEach((input) => {
    const index = Number(input.dataset.eduIndex);
    const fieldName = input.dataset.eduField;
    if (profileState.educations[index]) {
      profileState.educations[index][fieldName] = input.value;
    }
  });
}

function renderSearchOptions(type, query = "") {
  const config = searchConfigs[type];
  const normalizedQuery = query.trim().toLowerCase();
  const options = config.options().filter((option) => option.toLowerCase().includes(normalizedQuery));

  if (!options.length) {
    return `<div class="empty-options">검색 결과가 없어요.</div>`;
  }

  return options
    .map(
      (option) => `
        <button class="search-option ${profileState.preferences[type] === option ? "selected" : ""}" type="button" data-select-search="${type}" data-search-value="${option}">
          ${option}
        </button>
      `,
    )
    .join("");
}

function wireSearchOptionButtons(type) {
  document.querySelectorAll("[data-select-search]").forEach((button) => {
    button.addEventListener("click", () => {
      profileState.preferences[type] = button.dataset.searchValue || "";
      closeSearchModal();
      renderMypage();
    });
  });
}

function wireSearchModal(type) {
  const input = document.querySelector("[data-search-input]");
  const optionList = document.querySelector("[data-search-options]");

  input?.addEventListener("input", () => {
    if (optionList) optionList.innerHTML = renderSearchOptions(type, input.value);
    wireSearchOptionButtons(type);
  });

  wireSearchOptionButtons(type);

  document.querySelector("[data-close-modal]")?.addEventListener("click", closeSearchModal);
  document.querySelector("[data-modal-backdrop]")?.addEventListener("click", closeSearchModal);
}

function renderSearchModal(type) {
  const config = searchConfigs[type];
  const modalRoot = document.querySelector("#modalRoot");
  if (!config || !modalRoot) return;
  const helperText =
    type === "detailJob" && profileState.chips.jobs.size
      ? `선택한 희망 직무: ${[...profileState.chips.jobs].join(", ")}`
      : "검색하거나 아래 목록에서 선택하세요.";

  modalRoot.innerHTML = `
    <div class="modal-backdrop" data-modal-backdrop></div>
    <section class="search-modal" role="dialog" aria-modal="true" aria-label="${config.label} 선택">
      <div class="search-modal-head">
        <div>
          <h3>${config.label} 선택</h3>
          <p>${helperText}</p>
        </div>
        <button class="icon-button modal-close" type="button" data-close-modal aria-label="닫기">×</button>
      </div>
      <div class="modal-search-box">
        ${icon("search")}
        <input data-search-input type="search" placeholder="${config.placeholder}" autofocus />
      </div>
      <div class="search-options" data-search-options>
        ${renderSearchOptions(type)}
      </div>
    </section>
  `;
  wireSearchModal(type);
}

function closeSearchModal() {
  const modalRoot = document.querySelector("#modalRoot");
  if (modalRoot) modalRoot.innerHTML = "";
}

function wireMypage() {
  const photoInput = document.querySelector("#photoInput");
  const photoButton = document.querySelector("[data-photo-button]");
  const photoPreview = document.querySelector("[data-photo-preview]");

  photoButton?.addEventListener("click", () => photoInput?.click());
  photoInput?.addEventListener("change", () => {
    const file = photoInput.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.addEventListener("load", () => {
      profileState.photo = String(reader.result || "");
      localStorage.setItem("myfitfolioPhoto", profileState.photo);
      if (photoPreview) {
        photoPreview.innerHTML = `<img src="${profileState.photo}" alt="프로필 사진" />`;
        photoPreview.classList.add("has-photo");
      }
    });
    reader.readAsDataURL(file);
  });

  document.querySelector("[data-add-education]")?.addEventListener("click", () => {
    collectEducationValues();
    profileState.educations.push({
      schoolType: "대학교 4년",
      school: "",
      period: "",
      major: "",
      minor: "",
      gpa: "",
    });
    renderMypage();
  });

  document.querySelector("#school")?.addEventListener("click", (event) => {
    const deleteButton = event.target.closest("[data-delete-education]");
    if (!deleteButton || profileState.educations.length <= 1) return;
    collectEducationValues();
    profileState.educations.splice(Number(deleteButton.dataset.deleteEducation), 1);
    renderMypage();
  });

  document.querySelectorAll("[data-edu-field]").forEach((input) => {
    input.addEventListener("input", () => {
      const index = Number(input.dataset.eduIndex);
      const fieldName = input.dataset.eduField;
      profileState.educations[index][fieldName] = input.value;
    });
    input.addEventListener("change", () => {
      const index = Number(input.dataset.eduIndex);
      const fieldName = input.dataset.eduField;
      profileState.educations[index][fieldName] = input.value;
    });
  });

  document.querySelectorAll("[data-major-trigger]").forEach((button) => {
    button.addEventListener("click", () => {
      const menu = document.querySelector(`[data-major-menu="${button.dataset.majorTrigger}"]`);
      document.querySelectorAll(".major-menu.open").forEach((openMenu) => {
        if (openMenu !== menu) openMenu.classList.remove("open");
      });
      menu?.classList.toggle("open");
    });
  });

  document.querySelectorAll("[data-major-option]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.majorOption);
      const fieldName = button.dataset.majorField || "major";
      const value = button.dataset.majorValue || "";
      profileState.educations[index][fieldName] = value;
      const trigger = document.querySelector(`[data-major-trigger="${index}-${fieldName}"] span`);
      const menu = document.querySelector(`[data-major-menu="${index}-${fieldName}"]`);
      if (trigger) trigger.textContent = value;
      menu?.classList.remove("open");
    });
  });

  document.querySelectorAll("[data-anchor-target]").forEach((button) => {
    button.addEventListener("click", () => {
      const target = document.querySelector(`#${button.dataset.anchorTarget}`);
      target?.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll("[data-anchor-target]").forEach((item) => item.classList.remove("active"));
      button.classList.add("active");
    });
  });

  document.querySelectorAll("[data-open-search]").forEach((button) => {
    button.addEventListener("click", () => renderSearchModal(button.dataset.openSearch));
  });

  document.querySelector("[data-salary-select]")?.addEventListener("change", (event) => {
    profileState.preferences.salary = event.target.value;
  });

  document.querySelector("[data-save-profile]")?.addEventListener("click", () => {
    localStorage.setItem("myfitfolioProfileSaved", "true");
    setRoute("main");
  });

  document.querySelector("[data-toggle-date-picker]")?.addEventListener("click", () => {
    profileState.datePickerOpen = !profileState.datePickerOpen;
    renderMypage();
  });

  document.querySelectorAll("[data-date-part]").forEach((select) => {
    select.addEventListener("change", () => {
      const { year, month, day } = getDateParts(profileState.birthDate);
      const nextYear = select.dataset.datePart === "year" ? Number(select.value) : year;
      const nextMonth = select.dataset.datePart === "month" ? Number(select.value) : month;
      const nextDay = Math.min(day, getDaysInMonth(nextYear, nextMonth));
      profileState.birthDate = `${nextYear}-${String(nextMonth).padStart(2, "0")}-${String(nextDay).padStart(2, "0")}`;
      profileState.datePickerOpen = true;
      renderMypage();
    });
  });

  document.querySelectorAll("[data-date-day]").forEach((button) => {
    button.addEventListener("click", () => {
      const { year, month } = getDateParts(profileState.birthDate);
      const nextDay = Number(button.dataset.dateDay);
      profileState.birthDate = `${year}-${String(month).padStart(2, "0")}-${String(nextDay).padStart(2, "0")}`;
      profileState.datePickerOpen = false;
      renderMypage();
    });
  });

  document.querySelectorAll("[data-chip-group]").forEach((button) => {
    button.addEventListener("click", () => {
      const group = button.dataset.chipGroup;
      const value = button.dataset.chipValue;
      const selectedSet = profileState.chips[group];
      if (!selectedSet || !value) return;

      if (selectedSet.has(value)) {
        selectedSet.delete(value);
        button.classList.remove("selected");
      } else {
        selectedSet.add(value);
        button.classList.add("selected");
      }

      if (group === "jobs" && profileState.preferences.detailJob && !getDetailJobOptions().includes(profileState.preferences.detailJob)) {
        profileState.preferences.detailJob = "";
      }

      if (group === "jobs") {
        renderMypage();
      }
    });
  });
}

function renderBlank(route) {
  app.innerHTML = `
    <div class="app-shell">
      ${renderNav(route)}
      <main class="blank-page" aria-label="${routes[route]} 빈 화면"></main>
    </div>
  `;
  wireRoutes();
}

function render() {
  const route = window.location.hash.replace("#", "");
  const loggedIn = sessionStorage.getItem("myfitfolioLoggedIn") === "true";

  if (!loggedIn && route !== "login") {
    renderAuth("signup");
    return;
  }

  if (route === "login") {
    renderAuth("login");
    return;
  }

  if (route === "mypage") {
    renderMypage();
    return;
  }

  if (route === "portfolioCreate" || route === "portfolioManage" || route === "recommend") {
    renderBlank(route);
    return;
  }

  renderMain();
}

window.addEventListener("hashchange", render);
render();
