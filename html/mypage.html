<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 마이페이지</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/mypage.css" />
</head>
<body>
  <div class="app-shell">
    <div data-shared-nav data-active="mypage"></div>
    <script src="../js/shared-nav.js"></script>
    <script src="../js/auth-nav.js"></script>

    <main class="mypage">
      <div class="mypage-content">
        <h1 class="page-title">마이페이지</h1>
        <p class="page-subtitle">내 정보를 입력하고 취업 조건을 관리해보세요.</p>

        <div class="section-stack">
          <section class="profile-section" id="basic">
            <h2 class="section-heading">기본 정보</h2>
            <div class="field-grid">
              <div class="profile-photo">
                <span class="avatar-lg" data-photo-preview></span>
                <input id="photoInput" class="visually-hidden" type="file" accept="image/*" />
                <button class="ghost-button" type="button" data-photo-button>
                  <span class="upload-photo-icon" aria-hidden="true"></span> 사진 변경
                </button>
              </div>
              <div class="form-field">
                <label for="profileName">이름</label>
                <input id="profileName" type="text" value="김예지" />
              </div>
              <div class="form-field">
                <label for="profileGender">성별</label>
                <select id="profileGender">
                  <option selected>여성</option>
                  <option>남성</option>
                  <option>선택 안 함</option>
                </select>
              </div>
              <div class="form-field">
                <label>생년월일</label>
                <div class="date-control" data-date-control>
                  <button class="date-trigger" type="button" data-toggle-date-picker>
                    <span data-birth-display>2001.03.15</span>
                    <span class="calendar-icon" aria-hidden="true"></span>
                  </button>
                  <div data-date-picker></div>
                </div>
              </div>
            </div>
          </section>

          <section class="profile-section" id="contact">
            <h2 class="section-heading">연락처 정보 <span style="color:#98a4b5;font-size:12px">ⓘ 소셜 계정에서 가져온 정보입니다.</span></h2>
            <div class="inline-fields">
              <div class="form-field">
                <label for="profileEmail">이메일</label>
                <input id="profileEmail" type="email" value="user@univ.ac.kr" />
              </div>
              <div class="form-field">
                <label for="profilePhone">휴대폰번호</label>
                <input id="profilePhone" type="tel" value="010-1234-5678" />
              </div>
              <div class="form-field">
                <label for="profileAddress">주소</label>
                <input id="profileAddress" type="text" value="부산광역시 금정구 장전동" />
              </div>
            </div>
          </section>

          <section class="profile-section" id="school">
            <h2 class="section-heading">학력</h2>
            <div class="education-list" data-education-list></div>
            <button class="ghost-button" type="button" data-add-education style="margin-top:16px">+ 항목 추가</button>
          </section>

          <section class="profile-section" id="condition">
            <h2 class="section-heading">희망근무조건</h2>
            <div class="job-grid">
              <div class="form-field">
                <label>희망 직무</label>
                <div class="chip-row" data-chip-row="jobs"></div>
              </div>
              <div class="search-row">
                <div class="form-field">
                  <label>세부직무</label>
                  <button class="picker-trigger" type="button" data-open-search="detailJob">
                    <span class="placeholder" data-picked-value="detailJob">검색하여 선택</span>
                     <span class="picker-search-icon" aria-hidden="true">
                      <svg class="svg-icon" viewBox="0 0 24 24">
                        <circle cx="10.8" cy="10.8" r="5.9"></circle>
                        <path d="m15.4 15.4 3.8 3.8"></path>
                      </svg>
                    </span>
                  </button>
                </div>
                <div class="form-field">
                  <label>희망 업종</label>
                  <button class="picker-trigger" type="button" data-open-search="workIndustry">
                    <span class="placeholder" data-picked-value="workIndustry">검색하여 선택</span>
                     <span class="picker-search-icon" aria-hidden="true">
                      <svg class="svg-icon" viewBox="0 0 24 24">
                        <circle cx="10.8" cy="10.8" r="5.9"></circle>
                        <path d="m15.4 15.4 3.8 3.8"></path>
                      </svg>
                    </span>
                  </button>
                </div>
                <div class="form-field">
                  <label>희망근무지역</label>
                  <button class="picker-trigger" type="button" data-open-search="workRegion">
                    <span class="placeholder" data-picked-value="workRegion">검색하여 선택</span>
                     <span class="picker-search-icon" aria-hidden="true">
                      <svg class="svg-icon" viewBox="0 0 24 24">
                        <circle cx="10.8" cy="10.8" r="5.9"></circle>
                        <path d="m15.4 15.4 3.8 3.8"></path>
                      </svg>
                    </span>
                  </button>
                </div>
                <div class="form-field">
                  <label for="salarySelect">희망연봉</label>
                  <select id="salarySelect" data-salary-select></select>
                </div>
              </div>
            </div>
          </section>

          <section class="profile-section" id="interest">
            <h2 class="section-heading">관심분야</h2>
            <div class="section-stack">
              <div class="form-field">
                <label>관심 분야</label>
                <div class="chip-row" data-chip-row="interestFields"></div>
              </div>
              <div class="form-field">
                <label>관심 기업</label>
                <div class="chip-row" data-chip-row="companies"></div>
              </div>
              <div class="form-field">
                <label>관심 산업</label>
                <div class="chip-row" data-chip-row="industries"></div>
              </div>
            </div>
          </section>

           <section class="profile-section account-section" id="account">
            <h2 class="section-heading">계정 관리</h2>
            <div class="account-card">
              <div>
                <h3>로그인 계정 관리</h3>
                <p>현재 계정에서 로그아웃하거나 회원 탈퇴 절차로 이동할 수 있습니다.</p>
              </div>
              <div class="account-actions">
                <button class="outline-button" type="button" data-logout>로그아웃</button>
                <a class="danger-button" href="withdraw.html">탈퇴하기</a>
              </div>
            </div>
          </section>

          <div class="form-actions" data-form-actions></div>
        </div>
      </div>

      <aside class="anchor-menu" aria-label="마이페이지 섹션">
        <button class="active" type="button" data-anchor-target="basic">기본 정보</button>
        <button type="button" data-anchor-target="contact">연락처 정보</button>
        <button type="button" data-anchor-target="school">학력</button>
        <button type="button" data-anchor-target="condition">희망근무조건</button>
        <button type="button" data-anchor-target="interest">관심분야</button>
        <button type="button" data-anchor-target="account">계정 관리</button>
      </aside>
    </main>
    <div id="modalRoot"></div>
  </div>
  <script src="../js/mypage.js" defer></script>
</body>
</html>
