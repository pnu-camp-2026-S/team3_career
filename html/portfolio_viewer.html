<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 포트폴리오 보기</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/portfolio_manage.css" />
</head>
<body>
  <div class="portfolio-web-viewer" id="viewerContent">
    <a class="portfolio-viewer-close" href="portfolio_manage.html" aria-label="목록으로 이동"></a>
    <main class="portfolio-viewer-page">
      <section class="portfolio-slide-viewer" aria-label="포트폴리오 슬라이드 뷰어">
        <button class="slide-nav slide-nav-prev" id="prevSlideBtn" type="button" aria-label="이전 슬라이드">‹</button>
        <div class="portfolio-slide-frame">
          <img class="portfolio-slide-image" id="viewerBody" alt="포트폴리오 슬라이드 이미지" />
        </div>
        <button class="slide-nav slide-nav-next" id="nextSlideBtn" type="button" aria-label="다음 슬라이드">›</button>
      </section>
      <div class="viewer-control-bar" aria-label="슬라이드 컨트롤">
        <a class="viewer-control-link" href="portfolio_manage.html">목록</a>
        <button class="viewer-control-button" id="bottomPrevSlideBtn" type="button" aria-label="이전 슬라이드">‹</button>
        <span class="slide-count" id="slideCount"></span>
        <button class="viewer-control-button" id="bottomNextSlideBtn" type="button" aria-label="다음 슬라이드">›</button>
      </div>
    </main>
  </div>
  <script src="../js/portfolio_viewer.js" defer></script>
</body>
</html>
