<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 활동 추천</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/contest.css" />
</head>
<body>
  <div class="app-shell">
    <div data-shared-nav data-active="contest"></div>
    <script src="../js/shared-nav.js"></script>
    <script src="../js/auth-nav.js"></script>
    <main class="content-area">
      <div class="main-container">
        <section class="page-title">
          <div>
            <p class="eyebrow">AI 맞춤 추천</p>
            <h1>부족한 역량을 보완할 활동을 추천해드려요 <span class="recommend-count">추천 활동 10개</span></h1>
            <p>현재 포트폴리오에서 보완이 필요한 경험을 기준으로 활동을 선별했습니다.</p>
          </div>
        </section>

        <section class="filter-bar">
          <div class="tabs" id="tabs">
            <button class="tab active" data-filter="all">전체</button>
            <button class="tab" data-filter="공모전">공모전</button>
            <button class="tab" data-filter="대외활동">대외활동</button>
            <button class="tab" data-filter="자격증">자격증</button>
            <button class="tab" data-filter="교육">교육</button>
          </div>

          <div class="filter-controls">
            <select id="industry-filter" aria-label="직무 필터">
              <option value="all">전체 직무</option>
              <option value="IT">IT</option>
              <option value="디자인">디자인</option>
              <option value="마케팅">마케팅</option>
            </select>
            <select id="level-filter" aria-label="난이도 필터">
              <option value="all">전체 난이도</option>
              <option value="하">하</option>
              <option value="중">중</option>
              <option value="상">상</option>
            </select>
            <label class="search-box" for="keyword-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input id="keyword-search" type="search" placeholder="키워드 검색" />
            </label>
          </div>
        </section>

        <section class="dashboard-grid">
          <div class="panel activity-panel">
            <div class="panel-header">
              <div>
                <p class="panel-label">추천 활동</p>
                <h2>우선순위 활동 목록</h2>
              </div>
              <p class="panel-note">활동을 클릭하면 상세 추천 이유를 확인할 수 있습니다.</p>
            </div>
            <div id="activity-list" class="activity-list"></div>
            <div id="activityPagination" class="activity-pagination" aria-label="추천 활동 페이지"></div>
            <div id="activity-detail" class="activity-detail hidden"></div>
          </div>

          <aside class="panel calendar-card">
            <div class="calendar-header">
              <div>
                <p class="panel-label">일정 관리</p>
                <h2>내 일정 캘린더</h2>
                <p class="calendar-subtitle">추천 활동을 저장하면 일정에 표시됩니다.</p>
              </div>
              <div class="calendar-controls" aria-label="캘린더 월 이동">
                <button id="prevCalendarMonth" class="calendar-nav" type="button" aria-label="이전 달">
                  <i class="fa-solid fa-chevron-left"></i>
                </button>
                <span id="calendarMonth" class="calendar-month">2026.07</span>
                <button id="nextCalendarMonth" class="calendar-nav" type="button" aria-label="다음 달">
                  <i class="fa-solid fa-chevron-right"></i>
                </button>
              </div>
            </div>

            <div class="calendar-grid" aria-label="캘린더">
              <span class="day-label">일</span>
              <span class="day-label">월</span>
              <span class="day-label">화</span>
              <span class="day-label">수</span>
              <span class="day-label">목</span>
              <span class="day-label">금</span>
              <span class="day-label">토</span>
              <div id="calendarDays" class="calendar-days"></div>
            </div>

            <div id="schedule-list" class="schedule-list"></div>
          </aside>
        </section>
      </div>
    </main>
  </div>

  <script src="../js/activity-recommendation-dataset.js"></script>
  <script src="../js/contest.js"></script>
</body>
</html>
