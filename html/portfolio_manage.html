<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerFit - 포트폴리오 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #fff; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: #f8fafc; border-right: 1px solid #e2e8f0; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
        .sidebar-header h2 { font-size: 22px; font-weight: 800; color: #2563eb; }
        .user-info { font-size: 13px; color: #64748b; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
        .sidebar-stat { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-box { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; padding: 14px; }
        .stat-box span { display: block; color: #64748b; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
        .stat-box strong { font-size: 24px; line-height: 1; color: #1e293b; }
        .quick-actions { display: flex; flex-direction: column; gap: 8px; }
        .quick-link { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; color: #475569; text-decoration: none; padding: 12px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .quick-link:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .content-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { height: 64px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 40px; gap: 28px; background: #fff; flex-shrink: 0; overflow-x: auto; }
        .tab-btn { text-decoration: none; font-size: 15px; font-weight: 600; color: #64748b; padding: 22px 0; position: relative; white-space: nowrap; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: #2563eb; border-radius: 3px 3px 0 0; }
        .main-container { flex: 1; overflow-y: auto; padding: 36px 40px; }
        .page-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
        .page-title h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .page-title p { color: #64748b; font-size: 15px; line-height: 1.6; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
        .search-box { min-width: 260px; flex: 1; max-width: 420px; display: flex; align-items: center; gap: 10px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0 12px; height: 42px; color: #94a3b8; }
        .search-box input { border: none; outline: none; flex: 1; min-width: 0; font-size: 14px; color: #1e293b; }
        .segmented { display: flex; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; background: #fff; }
        .segment-btn { border: none; background: #fff; color: #64748b; padding: 11px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        .segment-btn.active { color: #2563eb; background: #eff6ff; }
        .draft-layout { display: grid; grid-template-columns: 340px minmax(0, 1fr); gap: 18px; align-items: start; }
        .list-panel, .detail-panel { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; min-height: 520px; }
        .panel-head { height: 58px; border-bottom: 1px solid #e2e8f0; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .panel-head h2 { font-size: 16px; font-weight: 800; }
        .draft-list { display: flex; flex-direction: column; gap: 10px; padding: 14px; max-height: calc(100vh - 250px); overflow-y: auto; }
        .draft-card { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; padding: 14px; text-align: left; cursor: pointer; display: grid; gap: 10px; }
        .draft-card:hover, .draft-card.active { border-color: #2563eb; background: #eff6ff; }
        .draft-title { font-size: 15px; font-weight: 800; color: #1e293b; line-height: 1.35; overflow-wrap: anywhere; }
        .draft-preview { color: #64748b; font-size: 13px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .draft-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: #94a3b8; font-size: 12px; font-weight: 700; }
        .badge { border-radius: 6px; padding: 5px 8px; font-size: 12px; font-weight: 800; white-space: nowrap; }
        .badge.draft { background: #e0e7ff; color: #4338ca; }
        .badge.review { background: #fff7ed; color: #c2410c; }
        .badge.done { background: #dcfce7; color: #15803d; }
        .detail-body { padding: 22px; display: grid; gap: 18px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 180px; gap: 14px; }
        .field { display: grid; gap: 8px; }
        .field label { color: #475569; font-size: 13px; font-weight: 800; }
        .field input, .field select, .field textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-size: 14px; color: #1e293b; outline: none; background: #fff; }
        .field textarea { min-height: 300px; resize: vertical; line-height: 1.6; }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }
        .actionbar { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
        .btn { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; color: #475569; font-size: 14px; font-weight: 800; padding: 11px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        .btn-primary { border-color: #2563eb; background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; color: #fff; }
        .btn-danger { border-color: #fecaca; color: #b91c1c; }
        .btn-danger:hover { background: #fef2f2; border-color: #ef4444; color: #b91c1c; }
        .empty-state { min-height: 440px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; color: #64748b; padding: 28px; }
        .empty-state i { width: 52px; height: 52px; border-radius: 8px; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .empty-state strong { color: #1e293b; font-size: 18px; }
        @media (max-width: 1080px) {
            body { height: auto; min-height: 100vh; overflow: auto; }
            .sidebar { display: none; }
            .draft-layout { grid-template-columns: 1fr; }
            .draft-list { max-height: none; }
        }
        @media (max-width: 760px) {
            .topbar { padding: 0 20px; gap: 20px; }
            .main-container { padding: 28px 20px; }
            .page-title, .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: none; min-width: 0; }
            .segmented { overflow-x: auto; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CareerFit</h2>
            <div class="user-info"><i class="fa-solid fa-circle-check" style="color:#10b981;"></i> user@univ.ac.kr</div>
        </div>
        <div class="sidebar-stat">
            <div class="stat-box">
                <span>전체 초안</span>
                <strong id="totalCount">0</strong>
            </div>
            <div class="stat-box">
                <span>완료</span>
                <strong id="doneCount">0</strong>
            </div>
        </div>
        <div class="quick-actions">
            <a href="portfolio.html" class="quick-link"><i class="fa-solid fa-wand-magic-sparkles"></i><span>새 초안 생성</span></a>
            <a href="create.html" class="quick-link"><i class="fa-solid fa-file-circle-plus"></i><span>파일 생성</span></a>
        </div>
    </aside>

    <main class="content-area">
        <header class="topbar">
            <a href="main.html" class="tab-btn">메인</a>
            <a href="portfolio.html" class="tab-btn">포트폴리오 생성</a>
            <a href="portfolio_manage.html" class="tab-btn active">포트폴리오 관리</a>
            <a href="create.html" class="tab-btn">파일 생성</a>
            <a href="contest.html" class="tab-btn">공모전 추천</a>
            <a href="mypage.html" class="tab-btn">마이페이지</a>
        </header>

        <div class="main-container">
            <section class="page-title">
                <div>
                    <h1>포트폴리오 관리</h1>
                    <p>생성된 초안을 검토하고 상태별로 정리한 뒤 제출본으로 저장하세요.</p>
                </div>
                <a href="portfolio.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> 초안 생성</a>
            </section>

            <section class="toolbar" aria-label="포트폴리오 초안 필터">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="searchInput" type="search" placeholder="제목, 직무, 내용 검색">
                </div>
                <div class="segmented" role="tablist" aria-label="상태 필터">
                    <button class="segment-btn active" type="button" data-filter="all">전체</button>
                    <button class="segment-btn" type="button" data-filter="draft">초안</button>
                    <button class="segment-btn" type="button" data-filter="review">검토 중</button>
                    <button class="segment-btn" type="button" data-filter="done">완료</button>
                </div>
            </section>

            <div class="draft-layout">
                <section class="list-panel">
                    <div class="panel-head">
                        <h2>초안 목록</h2>
                        <span id="visibleCount" class="badge draft">0개</span>
                    </div>
                    <div class="draft-list" id="draftList"></div>
                </section>

                <section class="detail-panel" id="detailPanel"></section>
            </div>
        </div>
    </main>

    <script>
        const DRAFT_STORAGE_KEY = 'careerfit_portfolio_drafts';
        const draftList = document.getElementById('draftList');
        const detailPanel = document.getElementById('detailPanel');
        const searchInput = document.getElementById('searchInput');
        const visibleCount = document.getElementById('visibleCount');
        const totalCount = document.getElementById('totalCount');
        const doneCount = document.getElementById('doneCount');
        let drafts = [];
        let selectedDraftId = null;
        let currentFilter = 'all';

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function readDrafts() {
            try {
                const parsed = JSON.parse(localStorage.getItem(DRAFT_STORAGE_KEY)) || [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function writeDrafts(nextDrafts) {
            localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(nextDrafts));
        }

        function statusLabel(status) {
            if (status === 'review') return '검토 중';
            if (status === 'done') return '완료';
            return '초안';
        }

        function formatDate(isoDate) {
            if (!isoDate) return '-';
            const date = new Date(isoDate);
            if (Number.isNaN(date.getTime())) return '-';
            return new Intl.DateTimeFormat('ko-KR', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
            }).format(date);
        }

        function getFilteredDrafts() {
            const query = searchInput.value.trim().toLowerCase();
            return drafts.filter((draft) => {
                const matchesStatus = currentFilter === 'all' || draft.status === currentFilter;
                const haystack = `${draft.title || ''} ${draft.targetRole || ''} ${draft.content || ''}`.toLowerCase();
                return matchesStatus && (!query || haystack.includes(query));
            });
        }

        function renderStats() {
            totalCount.textContent = drafts.length;
            doneCount.textContent = drafts.filter((draft) => draft.status === 'done').length;
        }

        function renderDraftList() {
            const filtered = getFilteredDrafts();
            visibleCount.textContent = `${filtered.length}개`;
            draftList.innerHTML = '';

            if (filtered.length === 0) {
                selectedDraftId = null;
                draftList.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <strong>표시할 초안이 없습니다</strong>
                        <span>필터를 바꾸거나 새 초안을 생성해 주세요.</span>
                    </div>
                `;
                return;
            }

            if (!filtered.some((draft) => draft.id === selectedDraftId)) {
                selectedDraftId = filtered[0].id;
            }

            filtered.forEach((draft) => {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = `draft-card${draft.id === selectedDraftId ? ' active' : ''}`;
                card.dataset.id = draft.id;
                card.innerHTML = `
                    <div class="draft-title">${escapeHtml(draft.title || '제목 없는 초안')}</div>
                    <div class="draft-preview">${escapeHtml(draft.content || '내용 없음')}</div>
                    <div class="draft-meta">
                        <span>${escapeHtml(draft.targetRole || '직무 미지정')}</span>
                        <span>${formatDate(draft.updatedAt || draft.createdAt)}</span>
                    </div>
                    <span class="badge ${draft.status || 'draft'}">${statusLabel(draft.status)}</span>
                `;
                card.addEventListener('click', () => {
                    selectedDraftId = draft.id;
                    render();
                });
                draftList.appendChild(card);
            });
        }

        function renderDetail() {
            const draft = drafts.find((item) => item.id === selectedDraftId);

            if (!draft) {
                detailPanel.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-file-lines"></i>
                        <strong>관리할 초안을 선택하세요</strong>
                        <span>포트폴리오 생성 화면에서 만든 초안이 여기에 저장됩니다.</span>
                        <a href="portfolio.html" class="btn btn-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> 포트폴리오 생성</a>
                    </div>
                `;
                return;
            }

            detailPanel.innerHTML = `
                <div class="panel-head">
                    <h2>초안 편집</h2>
                    <span class="badge ${draft.status || 'draft'}">${statusLabel(draft.status)}</span>
                </div>
                <div class="detail-body">
                    <div class="detail-grid">
                        <div class="field">
                            <label for="draftTitle">제목</label>
                            <input id="draftTitle" type="text" value="${escapeHtml(draft.title || '')}">
                        </div>
                        <div class="field">
                            <label for="draftStatus">상태</label>
                            <select id="draftStatus">
                                <option value="draft" ${draft.status === 'draft' ? 'selected' : ''}>초안</option>
                                <option value="review" ${draft.status === 'review' ? 'selected' : ''}>검토 중</option>
                                <option value="done" ${draft.status === 'done' ? 'selected' : ''}>완료</option>
                            </select>
                        </div>
                    </div>
                    <div class="field">
                        <label for="draftRole">지원 직무</label>
                        <input id="draftRole" type="text" value="${escapeHtml(draft.targetRole || '')}" placeholder="예: 백엔드 개발자">
                    </div>
                    <div class="field">
                        <label for="draftContent">초안 내용</label>
                        <textarea id="draftContent">${escapeHtml(draft.content || '')}</textarea>
                    </div>
                    <div class="actionbar">
                        <button class="btn btn-primary" type="button" id="saveDraftBtn"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
                        <button class="btn" type="button" id="duplicateDraftBtn"><i class="fa-regular fa-copy"></i> 복제</button>
                        <button class="btn" type="button" id="exportDraftBtn"><i class="fa-solid fa-download"></i> 텍스트 저장</button>
                        <button class="btn btn-danger" type="button" id="deleteDraftBtn"><i class="fa-solid fa-trash-can"></i> 삭제</button>
                    </div>
                </div>
            `;

            document.getElementById('saveDraftBtn').addEventListener('click', saveSelectedDraft);
            document.getElementById('duplicateDraftBtn').addEventListener('click', duplicateSelectedDraft);
            document.getElementById('exportDraftBtn').addEventListener('click', exportSelectedDraft);
            document.getElementById('deleteDraftBtn').addEventListener('click', deleteSelectedDraft);
        }

        function saveSelectedDraft() {
            const draft = drafts.find((item) => item.id === selectedDraftId);
            if (!draft) return;

            draft.title = document.getElementById('draftTitle').value.trim() || '제목 없는 초안';
            draft.status = document.getElementById('draftStatus').value;
            draft.targetRole = document.getElementById('draftRole').value.trim();
            draft.content = document.getElementById('draftContent').value.trim();
            draft.updatedAt = new Date().toISOString();
            writeDrafts(drafts);
            render();
        }

        function duplicateSelectedDraft() {
            const draft = drafts.find((item) => item.id === selectedDraftId);
            if (!draft) return;

            const duplicated = {
                ...draft,
                id: `draft-${Date.now()}`,
                title: `${draft.title || '제목 없는 초안'} 복사본`,
                status: 'draft',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
            };
            drafts = [duplicated, ...drafts];
            selectedDraftId = duplicated.id;
            writeDrafts(drafts);
            render();
        }

        function exportSelectedDraft() {
            const draft = drafts.find((item) => item.id === selectedDraftId);
            if (!draft) return;

            const body = [
                `제목: ${draft.title || '제목 없는 초안'}`,
                `지원 직무: ${draft.targetRole || '미지정'}`,
                `상태: ${statusLabel(draft.status)}`,
                '',
                draft.content || '',
            ].join('\n');
            const blob = new Blob([body], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${draft.title || 'portfolio-draft'}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        function deleteSelectedDraft() {
            const draft = drafts.find((item) => item.id === selectedDraftId);
            if (!draft) return;
            if (!confirm('선택한 포트폴리오 초안을 삭제할까요?')) return;

            drafts = drafts.filter((item) => item.id !== selectedDraftId);
            selectedDraftId = drafts[0]?.id || null;
            writeDrafts(drafts);
            render();
        }

        function render() {
            renderStats();
            renderDraftList();
            renderDetail();
        }

        document.querySelectorAll('.segment-btn').forEach((button) => {
            button.addEventListener('click', () => {
                currentFilter = button.dataset.filter;
                document.querySelectorAll('.segment-btn').forEach((item) => item.classList.remove('active'));
                button.classList.add('active');
                render();
            });
        });

        searchInput.addEventListener('input', render);
        window.addEventListener('storage', (event) => {
            if (event.key === DRAFT_STORAGE_KEY) {
                drafts = readDrafts();
                selectedDraftId = drafts[0]?.id || null;
                render();
            }
        });

        drafts = readDrafts();
        selectedDraftId = drafts[0]?.id || null;
        render();
    </script>
</body>
</html>
