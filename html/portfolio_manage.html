<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myfitfolio - 포트폴리오 보관함</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { min-height: 100vh; background: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 22px 22px; color: #172033; padding: 34px; }
        .app-shell { max-width: 1180px; min-height: calc(100vh - 68px); margin: 0 auto; background: rgba(255,255,255,.96); border: 1px solid #dbe2f0; border-radius: 18px; overflow: hidden; box-shadow: 0 24px 70px rgba(79,70,229,.12); }
        .top-menu { height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 0 34px; border-bottom: 1px solid #e8edf7; background: #fff; }
        .brand { font-size: 23px; font-weight: 900; color: #111827; letter-spacing: 0; white-space: nowrap; }
        .brand:empty { width: 0; overflow: hidden; }
        .brand span { color: #4f46e5; }
        .nav { display: flex; align-items: center; gap: 6px; min-width: 0; overflow-x: auto; }
        .nav a { height: 40px; display: inline-flex; align-items: center; gap: 8px; padding: 0 13px; border-radius: 8px; color: #667085; text-decoration: none; font-size: 14px; font-weight: 800; white-space: nowrap; }
        .nav a.active { color: #4f46e5; background: #eef2ff; }
        .profile { display: flex; align-items: center; gap: 12px; color: #475569; font-size: 13px; font-weight: 800; white-space: nowrap; }
        .profile i { color: #64748b; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: #e5e7eb; display: grid; place-items: center; }
        .layout { display: grid; grid-template-columns: 270px minmax(0, 1fr); min-height: calc(100vh - 144px); }
        .folder-sidebar { background: #fbfcff; border-right: 1px solid #e8edf7; padding: 34px 24px; }
        .side-brand { font-size: 32px; font-weight: 950; color: #5b5ce9; letter-spacing: 0; line-height: 1; margin-bottom: 20px; }
        .side-user { display: flex; align-items: center; gap: 10px; color: #64748b; font-size: 15px; font-weight: 800; margin-bottom: 72px; }
        .online-dot { width: 13px; height: 13px; border-radius: 50%; background: #7cc96f; box-shadow: 0 0 0 3px #e8f7e6; }
        .folder-sidebar h2 { font-size: 18px; color: #8b95a8; margin-bottom: 38px; text-decoration: underline; text-underline-offset: 3px; }
        .folder-list { list-style: none; display: grid; gap: 30px; }
        .folder-btn { width: 100%; min-height: 52px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: #344054; padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 900; text-align: left; }
        .folder-btn:hover { background: #f4f7ff; }
        .folder-btn.active { border-color: transparent; background: #eef2ff; color: #5b5ce9; }
        .folder-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .folder-main span { white-space: normal; overflow: visible; text-overflow: clip; line-height: 1.35; word-break: keep-all; }
        .folder-main i { color: #f2c94c; font-size: 17px; flex-shrink: 0; }
        .folder-count { color: #98a2b3; font-size: 15px; font-weight: 900; flex-shrink: 0; }
        .content { padding: 30px 34px 38px; background: linear-gradient(120deg, #fff 0%, #fff 68%, #f8fbff 100%); }
        .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 22px; }
        .page-head h1 { font-size: 30px; font-weight: 900; color: #111827; margin-bottom: 8px; }
        .page-head p { color: #667085; font-size: 14px; line-height: 1.6; }
        .create-btn { height: 42px; padding: 0 18px; border: 0; border-radius: 8px; background: #4f46e5; color: #fff; font-weight: 900; box-shadow: 0 12px 24px rgba(79,70,229,.25); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
        .toolbar { display: grid; grid-template-columns: minmax(180px, 1fr) auto; gap: 12px; margin-bottom: 18px; }
        .search { height: 40px; border: 1px solid #e4e8f2; border-radius: 8px; background: #fff; display: flex; align-items: center; gap: 10px; padding: 0 13px; color: #98a2b3; }
        .search input { border: 0; outline: 0; width: 100%; background: transparent; color: #475569; font-weight: 700; }
        .filters { display: flex; gap: 8px; }
        .filter-btn { min-width: 58px; height: 40px; padding: 0 13px; border: 1px solid #e4e8f2; border-radius: 8px; background: #fff; color: #667085; font-weight: 900; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { border-color: #6366f1; color: #4f46e5; background: #eef2ff; }
        .portfolio-list { display: grid; gap: 14px; }
        .portfolio-card { display: grid; grid-template-columns: 118px minmax(0, 1fr) auto; gap: 20px; align-items: center; border: 1px solid #edf0f7; border-radius: 8px; background: #fff; padding: 16px; box-shadow: 0 8px 24px rgba(17,24,39,.04); }
        .portfolio-card.draft { cursor: pointer; }
        .portfolio-card:hover { border-color: #c7d2fe; box-shadow: 0 14px 30px rgba(79,70,229,.1); }
        .thumb { height: 86px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #f8fafc; position: relative; }
        .thumb::before { content: ""; display: block; height: 10px; background: #4f46e5; }
        .thumb-lines { padding: 14px 12px; display: grid; gap: 8px; }
        .thumb-line { height: 7px; border-radius: 999px; background: #dbe4ff; }
        .thumb-line.short { width: 58%; }
        .thumb-chart { position: absolute; right: 10px; bottom: 12px; width: 30px; height: 30px; border-radius: 50%; background: conic-gradient(#6366f1 0 70%, #e0e7ff 70%); }
        .info { min-width: 0; }
        .title-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
        .title-row h2 { font-size: 17px; color: #111827; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .status { border-radius: 6px; padding: 4px 9px; font-size: 12px; font-weight: 900; white-space: nowrap; }
        .status.done { background: #ecfdf5; color: #059669; }
        .status.draft { background: #f3f4f6; color: #64748b; }
        .meta { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 9px; color: #64748b; font-size: 12px; font-weight: 700; }
        .summary { color: #667085; font-size: 13px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .actions { display: grid; gap: 9px; justify-items: end; }
        .like-row { display: flex; gap: 8px; }
        .action-btn { height: 34px; border: 1px solid #e4e8f2; border-radius: 7px; background: #fff; color: #475569; padding: 0 12px; font-size: 12px; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; text-decoration: none; }
        .action-btn:hover { border-color: #6366f1; color: #4f46e5; background: #f5f7ff; }
        .action-btn.liked { background: #eef2ff; border-color: #818cf8; color: #4f46e5; }
        .action-btn.primary { border-color: #6366f1; color: #4f46e5; }
        .empty-pane { display: none; }
        .empty { padding: 52px 20px; text-align: center; border: 1px dashed #dbe2f0; border-radius: 8px; color: #64748b; background: #fbfdff; }
        @media (max-width: 980px) {
            body { padding: 0; background: #fff; }
            .app-shell { min-height: 100vh; border-radius: 0; }
            .top-menu { height: auto; padding: 18px; align-items: flex-start; flex-wrap: wrap; }
            .nav { order: 3; width: 100%; }
            .layout { grid-template-columns: 1fr; }
            .folder-sidebar { border-right: 0; border-bottom: 1px solid #e8edf7; padding: 18px; }
            .side-brand { font-size: 28px; }
            .side-user { margin-bottom: 24px; }
            .folder-sidebar h2 { margin-bottom: 16px; }
            .folder-list { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
            .content { padding: 24px; }
            .toolbar { grid-template-columns: 1fr; }
            .portfolio-card { grid-template-columns: 92px minmax(0, 1fr); }
            .actions { grid-column: 1 / -1; justify-items: stretch; display: flex; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="top-menu">
            <div class="brand" aria-hidden="true"></div>
            <nav class="nav" aria-label="상단 메뉴">
                <a href="blank.html"><i class="fa-solid fa-house"></i> 홈</a>
                <a href="blank.html"><i class="fa-regular fa-calendar-days"></i> 활동 기록</a>
                <a class="active" href="portfolio_manage.html"><i class="fa-regular fa-folder"></i> 포트폴리오</a>
                <a href="blank.html"><i class="fa-regular fa-lightbulb"></i> 공모전 추천</a>
                <a href="blank.html"><i class="fa-regular fa-user"></i> 마이페이지</a>
            </nav>
            <div class="profile">
                <i class="fa-regular fa-bell"></i>
                <span class="avatar"><i class="fa-solid fa-user"></i></span>
                홍길동 <i class="fa-solid fa-chevron-down" style="font-size:10px"></i>
            </div>
        </header>

        <div class="layout">
            <aside class="folder-sidebar">
                <div class="side-brand">Myfitfolio</div>
                <div class="side-user"><span class="online-dot"></span> user@univ.ac.kr</div>
                <h2>프로젝트 리스트</h2>
                <ul class="folder-list">
                    <li><button class="folder-btn active" type="button" data-folder="ai-service"><span class="folder-main"><i class="fa-solid fa-folder"></i><span>AI 포트폴리오 추천 서비스</span></span><span class="folder-count">3</span></button></li>
                    <li><button class="folder-btn" type="button" data-folder="capstone"><span class="folder-main"><i class="fa-solid fa-folder"></i><span>캡스톤 디자인 팀 프로젝트</span></span><span class="folder-count">3</span></button></li>
                    <li><button class="folder-btn" type="button" data-folder="contest"><span class="folder-main"><i class="fa-solid fa-folder"></i><span>교내 SW 아이디어 공모전</span></span><span class="folder-count">3</span></button></li>
                    <li><button class="folder-btn" type="button" data-folder="volunteer"><span class="folder-main"><i class="fa-solid fa-folder"></i><span>봉사 활동 멘토링</span></span><span class="folder-count">2</span></button></li>
                </ul>
                <div class="empty-pane" aria-hidden="true"></div>
            </aside>

            <main class="content">
                <section class="page-head">
                    <div>
                        <h1>포트폴리오 보관함</h1>
                        <p>완료된 포트폴리오와 임시저장 포트폴리오를 한 페이지에서 확인합니다.</p>
                    </div>
                    <a class="create-btn" href="blank.html"><i class="fa-solid fa-plus"></i> 새 포트폴리오 만들기</a>
                </section>

                <section class="toolbar" aria-label="포트폴리오 필터">
                    <label class="search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="search" placeholder="포트폴리오 검색">
                    </label>
                    <div class="filters" role="tablist" aria-label="상태 필터">
                        <button class="filter-btn active" type="button" data-filter="all">전체</button>
                        <button class="filter-btn" type="button" data-filter="done">완료</button>
                        <button class="filter-btn" type="button" data-filter="draft">임시저장</button>
                    </div>
                </section>

                <section id="portfolioList" class="portfolio-list" aria-label="포트폴리오 목록"></section>
            </main>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'careerfit_portfolios';
        const LEGACY_DRAFT_KEY = 'careerfit_portfolio_drafts';

        const seedPortfolios = [
            {
                id: 'portfolio-data',
                title: '데이터 분석 직무 포트폴리오',
                createdAt: '2026-07-02T09:00:00.000Z',
                purpose: '데이터 분석 직무 지원',
                summary: '공공데이터와 시각화 프로젝트 경험을 중심으로 정리했어요.',
                status: 'done',
                liked: true,
                content: '데이터 수집, 전처리, 시각화, 인사이트 도출 경험을 한 흐름으로 구성한 포트폴리오입니다.'
            },
            {
                id: 'portfolio-contest',
                title: '공모전 지원용 포트폴리오',
                createdAt: '2026-07-01T15:30:00.000Z',
                purpose: '공모전 제출',
                summary: '공모전 제출용으로 구성한 간결한 포트폴리오예요.',
                status: 'done',
                liked: false,
                content: '문제 정의, 기획 의도, 팀 내 역할, 결과물을 중심으로 공모전 심사에 맞게 정리했습니다.'
            },
            {
                id: 'portfolio-ux',
                title: 'UX 프로젝트 중심 포트폴리오',
                createdAt: '2026-06-30T11:00:00.000Z',
                purpose: 'UX 리서치 직무 지원',
                summary: '사용자 조사와 화면 개선 사례를 중심으로 정리했어요.',
                status: 'done',
                liked: true,
                content: '사용자 인터뷰, 페르소나, 와이어프레임, 개선안 검증 과정을 한눈에 볼 수 있게 구성했습니다.'
            },
            {
                id: 'draft-marketing',
                title: '마케팅 직무 포트폴리오 초안',
                createdAt: '2026-06-28T18:20:00.000Z',
                purpose: '마케팅 인턴 지원',
                summary: '마케팅 관련 경험과 성과를 정리 중인 초안이에요.',
                status: 'draft',
                liked: false,
                content: '콘텐츠 기획 경험, 캠페인 성과, 협업 경험을 추가로 보강해야 합니다.'
            }
        ];

        const portfolioList = document.getElementById('portfolioList');
        const searchInput = document.getElementById('searchInput');
        let portfolios = loadPortfolios();
        let currentFilter = 'all';
        let currentFolder = 'all';

        function loadPortfolios() {
            const stored = readJson(STORAGE_KEY);
            if (stored.length) return stored;

            const legacyDrafts = readJson(LEGACY_DRAFT_KEY).map((draft) => ({
                id: draft.id,
                title: draft.title || '임시저장 포트폴리오',
                createdAt: draft.createdAt || draft.updatedAt || new Date().toISOString(),
                purpose: draft.targetRole || '작성 중',
                summary: draft.content || '이어서 작성할 임시저장 포트폴리오입니다.',
                status: draft.status === 'done' ? 'done' : 'draft',
                liked: Boolean(draft.liked),
                content: draft.content || ''
            }));
            const merged = [...legacyDrafts, ...seedPortfolios];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
            return merged;
        }

        function readJson(key) {
            try {
                const parsed = JSON.parse(localStorage.getItem(key)) || [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function savePortfolios() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolios));
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return new Intl.DateTimeFormat('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
        }

        function statusLabel(status) {
            return status === 'done' ? '완료' : '임시저장';
        }

        function folderMatches(portfolio) {
            if (currentFolder === 'liked') return portfolio.liked;
            if (currentFolder === 'done') return portfolio.status === 'done';
            if (currentFolder === 'draft') return portfolio.status === 'draft';
            return true;
        }

        function getVisiblePortfolios() {
            const query = searchInput.value.trim().toLowerCase();
            return portfolios
                .filter(folderMatches)
                .filter((portfolio) => currentFilter === 'all' || portfolio.status === currentFilter)
                .filter((portfolio) => {
                    const haystack = `${portfolio.title} ${portfolio.purpose} ${portfolio.summary}`.toLowerCase();
                    return !query || haystack.includes(query);
                })
                .sort((a, b) => {
                    if (a.liked !== b.liked) return a.liked ? -1 : 1;
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });
        }

        function renderCounts() {
            return;
        }

        function render() {
            renderCounts();
            const visible = getVisiblePortfolios();
            portfolioList.innerHTML = '';

            if (!visible.length) {
                portfolioList.innerHTML = '<div class="empty">조건에 맞는 포트폴리오가 없습니다.</div>';
                return;
            }

            visible.forEach((portfolio) => {
                const card = document.createElement('article');
                card.className = `portfolio-card ${portfolio.status}`;
                card.innerHTML = `
                    <div class="thumb" aria-hidden="true">
                        <div class="thumb-lines">
                            <span class="thumb-line"></span>
                            <span class="thumb-line short"></span>
                            <span class="thumb-line"></span>
                        </div>
                        <span class="thumb-chart"></span>
                    </div>
                    <div class="info">
                        <div class="title-row">
                            <h2>${escapeHtml(portfolio.title)}</h2>
                            <span class="status ${portfolio.status}">${statusLabel(portfolio.status)}</span>
                        </div>
                        <div class="meta">
                            <span>${formatDate(portfolio.createdAt)} 생성</span>
                            <span>${escapeHtml(portfolio.purpose)}</span>
                        </div>
                        <p class="summary">${escapeHtml(portfolio.summary)}</p>
                    </div>
                    <div class="actions">
                        ${portfolio.status === 'done' ? `
                            <div class="like-row">
                                <button class="action-btn ${portfolio.liked ? 'liked' : ''}" type="button" data-action="like" data-id="${portfolio.id}">
                                    <i class="fa-solid fa-thumbs-up"></i> 좋아요
                                </button>
                            </div>
                            <a class="action-btn primary" href="portfolio-preview.html?id=${encodeURIComponent(portfolio.id)}">
                                <i class="fa-regular fa-eye"></i> 열기
                            </a>
                            <button class="action-btn" type="button" data-action="ppt" data-id="${portfolio.id}">
                                <i class="fa-solid fa-download"></i> PPT 저장
                            </button>
                        ` : `
                            <span class="action-btn primary"><i class="fa-regular fa-pen-to-square"></i> 이어서 작성</span>
                        `}
                    </div>
                `;

                if (portfolio.status === 'draft') {
                    card.addEventListener('click', () => {
                        window.location.href = 'blank.html';
                    });
                }

                portfolioList.appendChild(card);
            });
        }

        function toggleLike(id) {
            portfolios = portfolios.map((portfolio) =>
                portfolio.id === id ? { ...portfolio, liked: !portfolio.liked } : portfolio
            );
            savePortfolios();
            render();
        }

        function downloadPpt(id) {
            const portfolio = portfolios.find((item) => item.id === id);
            if (!portfolio) return;

            const body = [
                'Myfitfolio Portfolio',
                '',
                `제목: ${portfolio.title}`,
                `생성 날짜: ${formatDate(portfolio.createdAt)}`,
                `사용 목적: ${portfolio.purpose}`,
                '',
                portfolio.summary,
                '',
                portfolio.content
            ].join('\n');
            const blob = new Blob([body], {
                type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
            });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${portfolio.title.replace(/[\\/:*?"<>|]/g, '_')}.pptx`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        document.querySelectorAll('.filter-btn').forEach((button) => {
            button.addEventListener('click', () => {
                currentFilter = button.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach((item) => item.classList.remove('active'));
                button.classList.add('active');
                render();
            });
        });

        document.querySelectorAll('.folder-btn').forEach((button) => {
            button.addEventListener('click', () => {
                currentFolder = button.dataset.folder;
                document.querySelectorAll('.folder-btn').forEach((item) => item.classList.remove('active'));
                button.classList.add('active');
                render();
            });
        });

        portfolioList.addEventListener('click', (event) => {
            const button = event.target.closest('[data-action]');
            if (!button) return;
            event.stopPropagation();
            if (button.dataset.action === 'like') toggleLike(button.dataset.id);
            if (button.dataset.action === 'ppt') downloadPpt(button.dataset.id);
        });

        searchInput.addEventListener('input', render);
        render();
    </script>
</body>
</html>
