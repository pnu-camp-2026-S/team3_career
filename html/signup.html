<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커리어핏 - 회원가입</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* login.html과 동일한 스타일 사용 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: linear-gradient(135deg, #e6efff 0%, #f4f7fb 100%); display: flex; align-items: center; justify-content: center; height: 100vh; color: #333; }
        .auth-card { background: #fff; width: 100%; max-width: 420px; padding: 48px 40px; border-radius: 20px; box-shadow: 0 12px 36px rgba(0,0,0,0.08); text-align: center; }
        .auth-card h1 { font-size: 28px; font-weight: 800; color: #333; margin-bottom: 8px; }
        .auth-card p { font-size: 14px; color: #64748b; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; font-size: 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: #f8fafc; transition: 0.2s; }
        .form-group input:focus { outline: none; border-color: #2563eb; background: #fff; }
        .btn-primary { width: 100%; padding: 16px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }
        .toggle-link { margin-top: 24px; font-size: 14px; color: #64748b; }
        .toggle-link a { color: #2563eb; font-weight: 600; text-decoration: none; margin-left: 6px; }
        .toggle-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>회원가입</h1>
        <p>학교 이메일 인증으로 커리어핏을 시작하세요</p>
        <form onsubmit="return false;">
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="signupName" required>
            </div>
            <div class="form-group">
                <label>학교 이메일</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="signupPassword" required>
            </div>
            <button type="button" class="btn-primary" id="signupBtn">가입하기</button>
        </form>
        <script>
            document.getElementById('signupBtn').addEventListener('click', function() {
                // 간단한 유효성 확인
                const name = document.getElementById('signupName').value.trim();
                const email = document.getElementById('signupEmail').value.trim();
                const pw = document.getElementById('signupPassword').value;
                if (!name || !email || !pw) {
                    alert('모든 항목을 입력해주세요.');
                    return;
                }
                alert('가입이 완료되었습니다. 로그인 해주세요.');
                window.location.href = 'login.html';
            });

            // Enter 키로 폼 제출되는 것을 막기 위해 입력란에서 엔터 기본 동작 차단
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') e.preventDefault();
                });
            });
        </script>
        <div class="toggle-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
    </div>
</body>
</html>
