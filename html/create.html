<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 파일 생성</title>
  <link rel="stylesheet" href="fitfolio.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav">
      <a class="brand-word" href="main.html">Myfit<span>folio</span></a>
      <nav class="nav-tabs" aria-label="주요 메뉴">
        <a class="nav-tab" href="main.html">메인</a>
        <a class="nav-tab" href="portfolio_create.html">포트폴리오 생성</a>
        <a class="nav-tab" href="portfolio_manage.html">포트폴리오 관리</a>
        <a class="nav-tab active" href="create.html">파일 생성</a>
        <a class="nav-tab" href="contest.html">활동 추천</a>
        <a class="nav-tab" href="mypage.html">마이페이지</a>
      </nav>
      <div class="nav-actions">
        <button class="icon-button" type="button" aria-label="알림">!</button>
        <a class="user-chip" href="mypage.html" aria-label="마이페이지로 이동"><span class="avatar"></span></a>
      </div>
    </header>
    <main class="page-shell">
      <h1 class="page-title">파일 생성</h1>
      <p class="page-subtitle">활동 자료를 업로드하고 분류해 필요한 문서를 생성합니다.</p>
      <section class="panel">
        <h2 class="panel-title">새 파일 만들기</h2>
        <div class="form-row">
          <div class="form-field">
            <label>파일 제목</label>
            <input placeholder="예: 공모전 지원서 초안" />
          </div>
          <div class="form-field">
            <label>분류</label>
            <select>
              <option>공모전</option>
              <option>대외활동</option>
              <option>봉사활동</option>
            </select>
          </div>
        </div>
        <div class="form-actions"><button class="primary-button" type="button">파일 생성</button></div>
      </section>
    </main>
  </div>
  <script>document.querySelectorAll('.folder-title').forEach((button)=>{button.addEventListener('click',()=>button.closest('.folder-section')?.classList.toggle('open'));});</script>
</body>
</html>
