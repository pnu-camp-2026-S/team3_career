<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 파일 관리</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/create.css" />
</head>
<body>
  <div class="app-shell">
    <div data-shared-nav data-active="create"></div>
    <script src="../js/folder-store.js"></script>
    <script src="../js/shared-nav.js"></script>
    <script src="../js/auth-nav.js"></script>

    <main class="page-shell file-manager-page">
      <section class="file-manager-hero">
        <div>
          <h1 class="page-title">프로젝트 자료를 한곳에서 정리하세요</h1>
          <p class="page-subtitle">업로드한 활동 자료를 폴더별로 확인하고, AI 분석에 사용할 경험 데이터를 관리합니다.</p>
        </div>
        <div class="file-manager-actions">
          <button class="primary-button" type="button" data-action="analyze">분석하기</button>
        </div>
      </section>

      <section class="file-manager-layout">
        <aside class="panel folder-overview-panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">폴더 목록</h2>
              <p class="panel-note">메인 사이드바와 같은 폴더 형식입니다.</p>
            </div>
            <button class="ghost-button compact-button" type="button" data-action="create-folder">폴더 추가</button>
          </div>
          <div id="fileManagerFolderGroups" class="manager-folder-groups"></div>
        </aside>

        <section class="panel editable-file-panel">
          <div class="panel-head">
            <div>
              <div class="editable-title-row">
                <h2 class="panel-title" id="editablePanelTitle">개인 프로젝트 자료</h2>
                <button class="ghost-button compact-button" type="button" data-action="rename-project">이름 수정</button>
              </div>
              <p class="panel-note" id="editablePanelDesc">선택한 폴더의 자료를 확인하고 클릭 반응을 테스트합니다.</p>
            </div>
            <div class="project-actions">
              <button class="ghost-button compact-button" type="button" data-action="add-conversation">대화로 내용 추가하기</button>
              <button class="primary-button compact-button" type="button" data-action="toggle-group" id="moveGroupButton">완료로 이동</button>
              <button class="ghost-button compact-button danger-button" type="button" data-action="delete-project">프로젝트 삭제</button>
            </div>
          </div>

          <div class="subfolder-toolbar">
            <h3 id="subfolderPanelTitle">세부 폴더</h3>
            <span class="panel-note" id="subfolderPanelHint">활동 유형별 하위 폴더입니다. 하위 폴더를 선택하면 그 안의 자료만 보여요.</span>
          </div>
          <div id="subfolderList" class="subfolder-list"></div>

          <input class="visually-hidden" id="managedFileInput" type="file" multiple />
          <div class="manager-dropzone" data-action="add-file" role="button" tabindex="0">
            <strong>자료 추가</strong>
            <span id="dropzoneHint">클릭하거나 파일을 이곳에 끌어다 놓으세요. 선택한 세부 폴더에 자료가 추가됩니다.</span>
          </div>

          <div id="managedFileList" class="manager-file-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="manager-toast" id="toast">완료되었습니다.</div>

  <div class="manager-modal hidden" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="manager-modal-card">
      <div class="panel-head">
        <h2 class="panel-title" id="modalTitle">상세 정보</h2>
        <button class="icon-button" type="button" data-action="close-modal" aria-label="닫기">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <script src="../js/create.js" defer></script>
</body>
</html>
