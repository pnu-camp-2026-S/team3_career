<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerFit - 파일 생성</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',sans-serif}
        body{display:flex;height:100vh;overflow:hidden;background:#fff;color:#333}
        .sidebar{width:280px;background:#f8fafc;border-right:1px solid #e2e8f0;padding:20px;display:flex;flex-direction:column}
        .sidebar-header h2{font-size:20px;color:#2563eb;margin-bottom:12px}
        .nav-title{font-size:12px;color:#94a3b8;margin:12px 0;text-transform:uppercase}
        .nav-list{list-style:none;display:flex;flex-direction:column;gap:6px;overflow:auto}
        .nav-item{padding:8px;border-radius:8px;background:transparent;color:#475569;display:flex;justify-content:space-between;align-items:center}
        .content-area{flex:1;display:flex;flex-direction:column}
        .topbar{height:64px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 24px;gap:20px}
        .tab-btn{font-weight:600;color:#64748b;text-decoration:none;padding:22px 0;position:relative}
        .tab-btn.active{color:#2563eb}
        .main-panel{flex:1;padding:28px;overflow:auto}
        .chat-container{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
        .message{display:flex;gap:12px}
        .avatar{width:44px;height:44px;border-radius:10px;background:#eff6ff;color:#2563eb;display:flex;align-items:center;justify-content:center}
        .msg-content{background:#f8fafc;padding:14px;border-radius:10px}
        .input-wrap{padding:18px 28px;border-top:1px solid #eef2f7}
        .input-box{max-width:980px;margin:0 auto;display:flex;gap:12px}
        .input-box textarea{flex:1;padding:10px;border-radius:8px;border:1px solid #e6eef8;resize:none}
        .btn-send{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 12px;cursor:pointer}
        .hover-tooltip{position:fixed;pointer-events:none;background:rgba(2,6,23,0.95);color:#fff;padding:10px 12px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(2,6,23,0.2);transform:translate(-50%,-120%);z-index:80;white-space:nowrap}
        .hover-tooltip.hidden{display:none}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CareerFit</h2>
            <div style="font-size:13px;color:#64748b;margin-top:6px">파일 생성</div>
        </div>
        <div class="nav-title">내 소스 파일</div>
        <ul class="nav-list" id="sourceList"></ul>
    </aside>

    <main class="content-area">
        <header class="topbar">
            <a href="main.html" class="tab-btn">메인</a>
            <a href="portfolio.html" class="tab-btn">포트폴리오 생성</a>
            <a href="portfolio_manage.html" class="tab-btn">포트폴리오 관리</a>
            <a href="create.html" class="tab-btn active">파일 생성</a>
            <a href="contest.html" class="tab-btn">공모전 추천</a>
            <a href="mypage.html" class="tab-btn">마이페이지</a>
        </header>

        <div class="main-panel">
            <div class="chat-container" id="chatContainer">
                <div class="message">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="msg-content">
                        <div style="font-weight:800;margin-bottom:6px">AI 파일 생성 도우미</div>
                        <div style="color:#64748b;font-size:14px;line-height:1.6">왼쪽의 업로드된 자료를 참고하여 활동 증빙/포트폴리오용 문서를 AI와 대화하며 생성할 수 있습니다.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <textarea id="chatInput" rows="2" placeholder="예: 이력서용 경력 요약 3문장 만들어줘 (프론트엔드)" ></textarea>
                <button id="sendBtn" class="btn-send">전송</button>
            </div>
        </div>
    </main>

    <div id="hoverTooltip" class="hover-tooltip hidden">구체적인 활동 증빙 자료가 없어요</div>

    <script>
        const STORAGE_KEY = 'careerfit_source_files';
        let uploadedFiles = [];
        const sourceList = document.getElementById('sourceList');
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function getStoredFiles(){
            try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch{return[]}
        }
        function loadStored(){uploadedFiles=getStoredFiles();renderFiles();}
        function renderFiles(){sourceList.innerHTML='';uploadedFiles.forEach((f,i)=>{
            const li=document.createElement('li');li.className='nav-item';li.innerHTML=`<div style="display:flex;gap:8px;align-items:center"><i class="fa-regular fa-file"></i><span style="max-width:160px;display:inline-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</span></div>`;
            sourceList.appendChild(li);
        })}

        function appendMessage(role, text, title){
            const message=document.createElement('div');message.className='message';
            const avatar=document.createElement('div');avatar.className='avatar';avatar.innerHTML=role==='user'?'<i class="fa-solid fa-user"></i>':'<i class="fa-solid fa-robot"></i>';
            const content=document.createElement('div');content.className='msg-content';
            if(title){const t=document.createElement('div');t.style.fontWeight='800';t.style.marginBottom='6px';t.textContent=title;content.appendChild(t)}
            const p=document.createElement('div');p.style.color='#334155';p.style.fontSize='14px';p.style.lineHeight='1.6';p.textContent=text;content.appendChild(p);
            message.appendChild(avatar);message.appendChild(content);chatContainer.appendChild(message);chatContainer.scrollTop=chatContainer.scrollHeight;return message;
        }

        sendBtn.addEventListener('click',()=>{
            const val=chatInput.value.trim();if(!val) return;appendMessage('user',val,'나');chatInput.value='';
            const loading=appendMessage('assistant','AI가 응답을 준비 중입니다...','AI');
            // 실제 백엔드가 없으면 모의 응답
            setTimeout(()=>{
                loading.querySelector('div').textContent = '예시 결과: ' + val + ' (AI 생성 텍스트)';
            },800);
        });

        // 툴팁 동작
        (function(){
            const createTab = document.querySelector('a[href="create.html"]');
            const tooltip = document.getElementById('hoverTooltip');
            if(!createTab||!tooltip) return;
            function pos(e){tooltip.style.left=e.clientX+'px';tooltip.style.top=(e.clientY-12)+'px'}
            createTab.addEventListener('mouseenter', (e)=>{tooltip.classList.remove('hidden');pos(e)});
            createTab.addEventListener('mousemove',(e)=>pos(e));
            createTab.addEventListener('mouseleave',()=>tooltip.classList.add('hidden'));
        })();

        loadStored();
    </script>
</body>
</html>
