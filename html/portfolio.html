<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커리어핏 - 포트폴리오 자동 작성</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #fff; color: #333; display: flex; height: 100vh; overflow: hidden; }
        
        /* 드래그 앤 드롭 오버레이 (평소엔 숨김) */
        .drag-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(37, 99, 235, 0.85); /* 블루 반투명 배경 */
            color: white; font-size: 28px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .drag-overlay.active { opacity: 1; pointer-events: all; }
        .drag-overlay i { font-size: 64px; }

        .sidebar { width: 280px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 24px; }
        .sidebar-header h2 { font-size: 22px; font-weight: 800; color: #2563eb; margin-bottom: 24px; }
        .btn-upload { width: 100%; padding: 12px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px; color: #475569; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 24px; transition: 0.2s; }
        .btn-upload:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
        
        .nav-title { font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 12px; margin-top: 10px; text-transform: uppercase; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 50vh; }
        
        /* 파일 아이템 디자인 (삭제 버튼 포함) */
        .nav-item { padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #475569; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .nav-item:hover { background: #e2e8f0; }
        .file-info { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .file-info span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-delete { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .btn-delete:hover { color: #ef4444; background: #fee2e2; }
        
        .content-area { flex: 1; display: flex; flex-direction: column; }
        .topbar { height: 64px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 40px; gap: 32px; }
        .tab-btn { text-decoration: none; font-size: 15px; font-weight: 600; color: #64748b; padding: 22px 0; position: relative; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: #2563eb; border-radius: 3px 3px 0 0; }
        
        .chat-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        .message { display: flex; gap: 16px; max-width: 860px; margin: 0 auto; width: 100%; }
        .message.user { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #eff6ff; color: #2563eb; }
        .message.user .avatar { background: #f1f5f9; color: #475569; }
        .msg-content { flex: 1; padding-top: 8px; line-height: 1.6; color: #334155; font-size: 15px; }
        .message.user .msg-content { text-align: right; }
        .msg-title { font-weight: 700; font-size: 18px; color: #1e293b; margin-bottom: 12px; }
        
        .input-wrapper { padding: 20px 40px 40px; }
        .input-box { max-width: 860px; margin: 0 auto; display: flex; align-items: flex-end; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; }
        .input-box textarea { flex: 1; border: none; resize: none; outline: none; font-size: 15px; padding: 6px 0; }
        .btn-send { background: #2563eb; color: #fff; border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; margin-left: 12px; }
    </style>
</head>
<body>
    <div class="drag-overlay" id="dragOverlay">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>파일을 여기에 놓아 업로드하세요</span>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CareerFit</h2>
        </div>
        
        <input type="file" id="hiddenFileInput" style="display: none;" multiple>
        <button class="btn-upload" onclick="document.getElementById('hiddenFileInput').click()">
            <i class="fa-solid fa-plus"></i> 학적/포트폴리오 업로드
        </button>
        
        <div class="nav-title">내 소스 파일</div>
        <ul class="nav-list" id="sourceList"></ul>
    </aside>

    <main class="content-area">
        <header class="topbar">
            <a href="main.html" class="tab-btn">메인</a>
            <a href="portfolio.html" class="tab-btn active">포트폴리오 생성</a>
            <a href="portfolio_manage.html" class="tab-btn">포트폴리오 관리</a>
            <a href="create.html" class="tab-btn">파일 생성</a>
            <a href="contest.html" class="tab-btn">공모전 추천</a>
            <a href="mypage.html" class="tab-btn">마이페이지</a>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="msg-content">
                    <div class="msg-title">포트폴리오 초안 작성을 시작합니다 📄</div>
                    <p>좌측에 업로드된 데이터를 분석하여 직무에 맞춘 포트폴리오를 구성해 드립니다. 화면에 파일을 드래그하여 자료를 추가해 보세요!</p>
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea id="chatInput" placeholder="요청사항을 입력하세요... (예: 백엔드 직무로 작성해줘)" rows="1"></textarea>
                <button class="btn-send" id="sendButton" type="button"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </main>

    <div id="hoverTooltip" class="hover-tooltip hidden">구체적인 활동 증빙 자료가 없어요</div>

    <script>
        const STORAGE_KEY = 'careerfit_source_files';
        const DRAFT_STORAGE_KEY = 'careerfit_portfolio_drafts';
        let uploadedFiles = [];

        function getStoredFiles() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveStoredFiles(files) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
        }

        function getStoredDrafts() {
            try {
                const parsed = JSON.parse(localStorage.getItem(DRAFT_STORAGE_KEY)) || [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function buildDraftTitle(prompt, reply) {
            const firstLine = String(reply || '')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .find(Boolean);
            const baseTitle = (firstLine || prompt || '포트폴리오 초안')
                .replace(/^#+\s*/, '')
                .replace(/[*_`]/g, '')
                .trim();
            return baseTitle.length > 48 ? `${baseTitle.slice(0, 48)}...` : baseTitle;
        }

        function savePortfolioDraft(prompt, reply) {
            if (!reply) return;

            const now = new Date().toISOString();
            const drafts = getStoredDrafts();
            const sourceFiles = getStoredFiles().map((file) => file.name);

            drafts.unshift({
                id: `draft-${Date.now()}`,
                title: buildDraftTitle(prompt, reply),
                status: 'draft',
                targetRole: '',
                content: reply,
                prompt,
                sourceFiles,
                createdAt: now,
                updatedAt: now,
            });

            localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(drafts));
        }

        function loadStoredFiles() {
            uploadedFiles = getStoredFiles();
        }

        // DOM 요소 할당
        const dragOverlay = document.getElementById('dragOverlay');
        const sourceList = document.getElementById('sourceList');
        const fileInput = document.getElementById('hiddenFileInput');
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        function appendMessage(role, text, title) {
            const message = document.createElement('div');
            message.className = role === 'user' ? 'message user' : 'message';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = role === 'user'
                ? '<i class="fa-solid fa-user"></i>'
                : '<i class="fa-solid fa-robot"></i>';

            const content = document.createElement('div');
            content.className = 'msg-content';

            if (title) {
                const titleEl = document.createElement('div');
                titleEl.className = 'msg-title';
                titleEl.textContent = title;
                content.appendChild(titleEl);
            }

            const paragraph = document.createElement('p');
            paragraph.textContent = text;
            content.appendChild(paragraph);

            message.appendChild(avatar);
            message.appendChild(content);
            chatContainer.appendChild(message);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return message;
        }

        async function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage('user', message, '나');
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendButton.disabled = true;

            const loadingMessage = appendMessage('assistant', '답변을 작성하고 있습니다...', 'AI');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'AI 응답을 가져오지 못했습니다.');
                }

                const reply = data.reply || '응답이 비어 있습니다.';
                loadingMessage.querySelector('p').textContent = reply;

                if (data.reply) {
                    savePortfolioDraft(message, reply);
                }
            } catch (error) {
                loadingMessage.querySelector('p').textContent = error.message;
            } finally {
                sendButton.disabled = false;
                chatInput.focus();
            }
        }

        // 2. 파일 렌더링 함수: 배열의 데이터를 기반으로 HTML 리스트를 다시 그림
        function renderFileList() {
            sourceList.innerHTML = ''; // 기존 목록 초기화
            
            uploadedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                
                // 파일 확장자에 따른 아이콘 변경 로직
                let iconClass = 'fa-file';
                if (file.name.endsWith('.pdf')) iconClass = 'fa-file-pdf';
                else if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) iconClass = 'fa-file-image';
                else if (file.name.match(/\.(js|py|html|css|json)$/i)) iconClass = 'fa-file-code';

                li.innerHTML = `
                    <div class="file-info" title="${file.name}">
                        <i class="fa-regular ${iconClass}"></i>
                        <span>${file.name}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteFile(${index})" title="삭제">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                sourceList.appendChild(li);
            });
        }

        // 3. 파일 추가 로직
        function addFiles(files) {
            const currentFiles = getStoredFiles();
            Array.from(files).forEach(file => {
                currentFiles.push({ name: file.name, type: file.type });
            });
            saveStoredFiles(currentFiles);
            loadStoredFiles();
            renderFileList();
        }

        // 4. 파일 삭제 로직 (인덱스 기반)
        window.deleteFile = function(index) {
            const currentFiles = getStoredFiles();
            currentFiles.splice(index, 1);
            saveStoredFiles(currentFiles);
            loadStoredFiles();
            renderFileList();
        };

        // --- 이벤트 리스너 설정 ---

        sendButton.addEventListener('click', sendChatMessage);

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });

        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = `${chatInput.scrollHeight}px`;
        });

        // (1) 버튼 클릭으로 파일 선택 시
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                addFiles(e.target.files);
                e.target.value = ''; // 같은 파일을 다시 올릴 수 있도록 input 초기화
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === STORAGE_KEY) {
                loadStoredFiles();
                renderFileList();
            }
        });

        loadStoredFiles();
        renderFileList();

        // (2) 드래그 앤 드롭 이벤트 처리
        // 파일을 브라우저 화면 안으로 끌고 들어올 때 오버레이 표시
        window.addEventListener('dragover', (e) => {
            e.preventDefault(); // 기본 이벤트(파일 열기) 방지
            dragOverlay.classList.add('active');
        });

        // 파일을 화면 밖으로 빼거나 드래그를 취소할 때 오버레이 숨김
        dragOverlay.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
        });

        // 화면(오버레이)에 파일을 놓았을 때 (Drop)
        dragOverlay.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
            
            if (e.dataTransfer.files.length > 0) {
                addFiles(e.dataTransfer.files);
            }
        });
    </script>
    <script>
        (function(){
            const createTab = document.querySelector('a[href="create.html"]');
            const tooltip = document.getElementById('hoverTooltip');
            if (!createTab || !tooltip) return;

            function positionTooltip(e) {
                const x = e.clientX;
                const y = e.clientY;
                tooltip.style.left = x + 'px';
                tooltip.style.top = (y - 12) + 'px';
            }

            createTab.addEventListener('mouseenter', (e) => {
                tooltip.classList.remove('hidden');
                positionTooltip(e);
            });
            createTab.addEventListener('mousemove', (e) => positionTooltip(e));
            createTab.addEventListener('mouseleave', () => tooltip.classList.add('hidden'));
        })();
    </script>
</body>
</html>
