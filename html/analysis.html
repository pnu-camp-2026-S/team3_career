<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myfitfolio - 단일 파일 AI 분석</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/analysis.css" />
</head>
<body>
  <main class="analysis-page">
    <section class="analysis-card">
      <p class="analysis-kicker">단일 파일 AI 분석 (MVP)</p>
      <h1>자료 하나를 업로드하면 AI가 내용을 분석해 정리합니다</h1>
      <p class="analysis-note">지원 파일: md, txt, csv, pdf, docx · 분석 결과는 추천일 뿐 확정이 아닙니다.</p>

      <form id="analysisForm" class="analysis-form">
        <label class="analysis-field">
          <span>프로젝트 유형</span>
          <select id="projectType">
            <option value="personal">개인 프로젝트</option>
            <option value="team">팀 프로젝트</option>
            <option value="contest">공모전</option>
            <option value="certificate">자격증</option>
            <option value="education">교육</option>
            <option value="volunteer">봉사</option>
            <option value="other">기타</option>
          </select>
        </label>

        <label class="analysis-field">
          <span>분석할 파일</span>
          <input id="analysisFile" type="file" accept=".md,.txt,.csv,.pdf,.docx" />
        </label>

        <button class="primary-button" type="submit" id="analyzeButton">분석하기</button>
      </form>

      <p class="analysis-status" id="analysisStatus" hidden></p>
    </section>

    <section class="analysis-card analysis-result" id="analysisResult" hidden>
      <div class="result-head">
        <h2 id="resultTitle">분석 결과</h2>
        <span class="review-pill" id="reviewPill">확인 필요</span>
      </div>

      <dl class="result-grid">
        <div><dt>한 줄 요약</dt><dd id="resultOneLine"></dd></div>
        <div><dt>상세 요약</dt><dd id="resultDetailed"></dd></div>
        <div><dt>핵심 포인트</dt><dd><ul id="resultKeyPoints"></ul></dd></div>
        <div>
          <dt>AI 추천 하위 폴더</dt>
          <dd>
            <strong id="resultFolder"></strong>
            <span class="confidence-badge" id="resultConfidence"></span>
            <p class="reason-text" id="resultReason"></p>
          </dd>
        </div>
        <div><dt>추천 우선순위</dt><dd id="resultPriority"></dd></div>
        <div><dt>포트폴리오 활용 후보</dt><dd><ul id="resultSignals"></ul></dd></div>
        <div><dt>확인 필요 사항</dt><dd><ul id="resultWarnings"></ul></dd></div>
      </dl>

      <div class="result-actions">
        <button class="primary-button" type="button" id="acceptButton">이대로 확정</button>
        <button class="outline-button" type="button" id="editButton">수정하기</button>
      </div>
      <p class="analysis-note" id="reviewNote" hidden></p>

      <div class="download-row">
        <button class="ghost-button" type="button" data-download="summary">summary.md</button>
        <button class="ghost-button" type="button" data-download="index">index.json</button>
        <button class="ghost-button" type="button" data-download="log">log.md</button>
        <button class="ghost-button" type="button" data-download="result">analysis-result.json</button>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('analysisForm');
    const statusEl = document.getElementById('analysisStatus');
    const resultSection = document.getElementById('analysisResult');
    const analyzeButton = document.getElementById('analyzeButton');
    let lastOutput = null;

    function setStatus(text, isError) {
      statusEl.hidden = false;
      statusEl.textContent = text;
      statusEl.classList.toggle('is-error', Boolean(isError));
    }

    function renderList(elementId, items, formatter) {
      const list = document.getElementById(elementId);
      list.innerHTML = '';
      const values = Array.isArray(items) && items.length ? items : null;
      if (!values) {
        const li = document.createElement('li');
        li.textContent = '없음';
        list.appendChild(li);
        return;
      }
      values.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = formatter ? formatter(item) : String(item);
        list.appendChild(li);
      });
    }

    function signalText(kind, item) {
      const name = item.name || item.claim || '';
      const evidence = Array.isArray(item.evidence) && item.evidence[0]
        ? ` — ${item.evidence[0].summary} (${item.evidence[0].location})`
        : '';
      return `[${kind}] ${name}${evidence}`;
    }

    function renderResult(output) {
      lastOutput = output;
      const result = output.analysisResult;
      const summary = result.fileSummary || {};
      const classification = result.classification || {};
      const signals = result.portfolioSignals || {};

      document.getElementById('resultTitle').textContent = summary.title || '분석 결과';
      document.getElementById('resultOneLine').textContent = summary.oneLine || '';
      document.getElementById('resultDetailed').textContent = summary.detailed || '';
      renderList('resultKeyPoints', summary.keyPoints);
      document.getElementById('resultFolder').textContent =
        `${classification.recommendedFolderName || ''} (${classification.recommendedFolderId || ''})`;
      document.getElementById('resultConfidence').textContent =
        `신뢰도 ${Math.round((classification.confidence || 0) * 100)}%`;
      document.getElementById('resultReason').textContent = classification.reason || '';
      document.getElementById('resultPriority').textContent =
        `${result.recommendedPriority?.value ?? '-'} — ${result.recommendedPriority?.reason || ''}`;

      const signalItems = []
        .concat((signals.roles || []).map((item) => signalText('역할', item)))
        .concat((signals.skills || []).map((item) => signalText('기술', item)))
        .concat((signals.impact || []).map((item) => signalText('성과', item)));
      renderList('resultSignals', signalItems);
      renderList('resultWarnings', result.warnings);

      document.getElementById('reviewPill').textContent = '확인 필요';
      document.getElementById('reviewNote').hidden = true;
      resultSection.hidden = false;
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById('analysisFile');
      const file = fileInput.files[0];
      if (!file) {
        setStatus('분석할 파일을 선택해주세요.', true);
        return;
      }

      const body = new FormData();
      body.append('file', file);
      body.append('projectType', document.getElementById('projectType').value);

      analyzeButton.disabled = true;
      resultSection.hidden = true;
      setStatus('업로드 및 텍스트 추출 중...');

      try {
        setStatus('AI 분석 중... (최대 1분 정도 걸릴 수 있어요)');
        const response = await fetch('/api/analysis/single-file', { method: 'POST', body });
        const payload = await response.json();

        if (!payload.ok) {
          const detail = payload.errors ? payload.errors.join(' / ') : payload.error;
          setStatus(`분석 실패: ${detail}`, true);
          return;
        }

        setStatus(`분석 완료 (제공자: ${payload.provider})`);
        renderResult(payload);
      } catch (error) {
        setStatus(`요청 중 오류가 발생했습니다: ${error.message}`, true);
      } finally {
        analyzeButton.disabled = false;
      }
    });

    document.getElementById('acceptButton').addEventListener('click', () => {
      if (!lastOutput) return;
      document.getElementById('reviewPill').textContent = '확정됨(로컬)';
      const note = document.getElementById('reviewNote');
      note.hidden = false;
      note.textContent = '현재 프로토타입에서는 화면 표시만 변경됩니다. DB 연결 후 실제 확정 저장이 붙습니다.';
    });

    document.getElementById('editButton').addEventListener('click', () => {
      const note = document.getElementById('reviewNote');
      note.hidden = false;
      note.textContent = '수정 UI는 DB 연결 후 제공됩니다. 지금은 결과를 내려받아 직접 수정해주세요.';
    });

    function downloadText(fileName, text) {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = fileName;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll('[data-download]').forEach((button) => {
      button.addEventListener('click', () => {
        if (!lastOutput) return;
        const kind = button.dataset.download;
        if (kind === 'summary') downloadText('summary.md', lastOutput.summaryMarkdown);
        if (kind === 'index') downloadText('index.json', JSON.stringify(lastOutput.indexDraft, null, 2));
        if (kind === 'log') downloadText('log.md', lastOutput.logMarkdown);
        if (kind === 'result') downloadText('analysis-result.json', JSON.stringify(lastOutput.analysisResult, null, 2));
      });
    });
  </script>
</body>
</html>
